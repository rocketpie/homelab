---
homelab_dns_blocklist_sources:
  - "https://codeberg.org/hagezi/mirror2/raw/branch/main/dns-blocklists/rpz/multi.txt"
  - "https://codeberg.org/hagezi/mirror2/raw/branch/main/dns-blocklists/rpz/doh.txt"


homelab_dns_forward_zones:
  - name: "fritz.box"
    forward_addrs:
      - "192.168.178.1"
  - name: "."
    forward_addrs:
      - "9.9.9.9"
      - "192.168.178.1"

homelab_dns_local_tld: "lan"

# Maps IP addresses to DNS aliases (names)
# Each IP can have multiple names/aliases
homelab_dns_records:
  "192.168.178.6":
    - "n2.pxe.vpn.lan"
  "192.168.178.5":
    - "n5.pxe.vpn.lan"
  "192.168.178.22":
    - "autoinstall-seed.lan"
  "192.168.178.55":
    - "dockerhost1.lan"
  "192.168.178.33":
    - "backup2.lan"
  "192.168.178.34":
    - "james.lan"
    - "licht.lan"
    - "grafana.lan"
  "10.13.0.5":
    - "james.vpn.lan"
    - "licht.vpn.lan"
    - "grafana.vpn.lan"
  "10.13.0.3":
    - "gateway.vpn.lan"
