---
all:
  vars:
    ansible_user: ansible
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "{{ ansible_admin_ssh_private_key_file }}"

  children:
    proxmox:
      hosts:
        n2:
          ansible_host: 192.168.178.6
          dns_name: n2.pxe
        n5:
          ansible_host: 192.168.178.5
          dns_name: n5.pxe

    vm:
      hosts:
        restic1:
          ansible_host: 192.168.178.195
        dhcp1:
          ansible_host: 192.168.178.193
        dhcp2:
          ansible_host: 192.168.178.194

    kea:
      hosts:
        dhcp1:

    unbound:
      hosts:
        dhcp1:
        dhcp2:

    ubuntu_auto_update:
      hosts:
        dhcp1:
        dhcp2:
        restic1:
