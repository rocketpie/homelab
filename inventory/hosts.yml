---
all:
  vars:
    ansible_user: ansible
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "{{ ansible_admin_ssh_private_key_file }}"

  children:
    proxmox:
      hosts:
        n2:
          ansible_host: 192.168.178.6
          dns_name: n2.pxe
        n5:
          ansible_host: 192.168.178.5
          dns_name: n5.pxe

    vm:
      hosts:
        netcontroller2:
          ansible_host: 192.168.178.194
        netcontroller1:
          ansible_host: 192.168.178.193
        restic1:
          ansible_host: 192.168.178.195
        admin1:
          ansible_host: 192.168.178.196
        dockerhost2:
          ansible_host: 192.168.178.201

    ansible_execution:
      hosts:
        admin1:

    docker:
      hosts:
        dockerhost2:

    paperless:
      hosts:
        dockerhost2:

    immich:
      hosts:
        dockerhost2:

    restic_client:
      hosts:
        dockerhost2:

    kea:
      hosts: {}

    unbound:
      hosts:
        netcontroller2:
        netcontroller1:

    ubuntu_auto_update:
      hosts:
        netcontroller1:
        netcontroller2:
        restic1:
        admin1:
        dockerhost2:

    restic_server:
      hosts:
        restic1:
