vmid: 22001
proxmox_node: "n2"
proxmox_replica_nodes:
  - "n5"

proxmox_ostype: "l26"
proxmox_iso_filename: "ubuntu-24.04.4-live-server-amd64-autoinstall.iso"

cores: 2
memory_mb: 3072
os_disk_gb: 20

extra_disks:
  - disk_gb: 700
    pve_storage: "local-pve-rpool"
    mount_path: "/media/backups"
    fs_type: "ext4"
    mount_options: "defaults,nofail"

# enable_autoupdate: false

add_vpn_client_overlay_ipv4: "10.13.0.13"

dns_aliases:
  - "backup.lan"
  - "backup.vpn.lan"

add_restic_server_data_dir: "/media/backups/restic-data"
add_restic_server_listen_address: ":8000"
add_restic_server_service_user: "archivar"
add_restic_server_service_group: "archivar"

add_restic_client_service_user: "archivar"
add_restic_client_service_group: "archivar"
add_restic_client_retention_schedule_enabled: true
add_restic_client_repositories_template_file: "add_restic_client_repositories.json.j2"

add_rclone_service_user: "archivar"
add_rclone_service_group: "archivar"
add_rclone_source_path: "/media/backups/restic-data/"
add_rclone_remote_path: "pCloud:homelab-restic1"

add_admin_scripts_user: "archivar"

host_users:
  - name: "archivar"
    description: "backup storage service account"
    groups:
      - sudo
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICYIQ2DpOGZ7q8FwbYfuJvDzaO0LYE3qrrD5q7qb0pKD lars@co3d.eu"

