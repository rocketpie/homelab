vmid: 22001
proxmox_node: "n2"

proxmox_ostype: "l26"
proxmox_iso_filename: "ubuntu-24.04.4-live-server-amd64-autoinstall.iso"

cores: 2
memory_mb: 2048
os_disk_gb: 20

extra_disks:
  - disk_gb: 50
    pve_storage: "local-pve-rpool"
    mount_path: "/media/backups"
    fs_type: "ext4"
    mount_options: "defaults,nofail"

# enable_autoupdate: false

dns_aliases:
  - "backup.lan"

add_restic_server_data_dir: "/media/backups/restic-data"
add_restic_server_listen_address: ":8000"

add_rclone_user: "rest-server"
add_rclone_group: "rest-server"
add_rclone_source_path: "/media/backups/restic-data/"
add_rclone_remote_path: "pCloud:homelab-restic1"

host_users:
  - name: "archivar"
    description: "backup storage service account"
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICYIQ2DpOGZ7q8FwbYfuJvDzaO0LYE3qrrD5q7qb0pKD lars@co3d.eu"

