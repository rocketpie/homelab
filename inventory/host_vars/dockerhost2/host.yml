vmid: 22012
proxmox_node: "n2"
proxmox_replica_nodes:
  - "n5"

proxmox_ostype: "l26"
proxmox_iso_filename: "ubuntu-24.04.4-live-server-amd64-autoinstall.iso"

cores: 4
memory_mb: 4096
os_disk_gb: 40

extra_disks:
  - disk_gb: 20
    pve_storage: "local-pve-rpool"
    mount_path: "/media/paperless-data"
    fs_type: "ext4"
    mount_options: "defaults,nofail"

# enable_autoupdate: false

dns_aliases:
  - "paperless.lan"

add_docker_users:
  - "captain"

add_paperless_owner_user: "captain"
add_paperless_time_zone: "Europe/Berlin"
add_paperless_ocr_language: "deu"

add_admin_scripts_user: "captain"

add_restic_client_repositories:
  - name: "paperless"
    path: "/media/paperless-data/export"
    repository: "rest:http://{rest_username}:{rest_password}@backup.lan:8000/{rest_username}/paperless"
    backup_schedule_enabled: false

host_users:
  - name: "captain"
    description: "container service account"
    groups:
      - sudo
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICYIQ2DpOGZ7q8FwbYfuJvDzaO0LYE3qrrD5q7qb0pKD lars@co3d.eu"

