---
- name: Install Docker engine on docker hosts
  hosts: docker
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for Docker base
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: add-docker.yml
        record_deployment_roles:
          - add_docker
        record_deployment_metadata:
          services:
            - docker

  roles:
    - role: add_docker

  post_tasks:
    - name: Record successful deployment history for Docker base
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: finish
        record_deployment_playbook: add-docker.yml
        record_deployment_roles:
          - add_docker
        record_deployment_metadata:
          services:
            - docker

- name: Install Paperless stack on paperless hosts
  hosts: paperless
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for Paperless stack
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: add-docker.yml
        record_deployment_roles:
          - add_paperless
          - add_admin_scripts
        record_deployment_metadata:
          services:
            - docker
            - paperless

  roles:
    - role: add_paperless
    - role: add_admin_scripts
      vars:
        add_admin_scripts_service_groups: >-
          {{
            (add_docker_admin_scripts_service_groups | default([]))
            + (add_paperless_admin_scripts_service_groups | default([]))
            + (
                add_immich_admin_scripts_service_groups | default([])
                if inventory_hostname in (groups['immich'] | default([]))
                else []
              )
          }}
        add_admin_scripts_extra_scripts: >-
          {{
            add_paperless_admin_scripts_extra_scripts | default([])
            + (
                add_immich_admin_scripts_extra_scripts | default([])
                if inventory_hostname in (groups['immich'] | default([]))
                else []
              )
          }}

  post_tasks:
    - name: Record successful deployment history for Paperless stack
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: finish
        record_deployment_playbook: add-docker.yml
        record_deployment_roles:
          - add_paperless
          - add_admin_scripts
        record_deployment_metadata:
          services:
            - docker
            - paperless

- name: Install Immich stack on immich hosts
  hosts: immich
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for Immich stack
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: add-docker.yml
        record_deployment_roles:
          - add_immich
          - add_admin_scripts
        record_deployment_metadata:
          services:
            - docker
            - immich

  roles:
    - role: add_immich
    - role: add_admin_scripts
      vars:
        add_admin_scripts_service_groups: >-
          {{
            (add_docker_admin_scripts_service_groups | default([]))
            + (
                add_paperless_admin_scripts_service_groups | default([])
                if inventory_hostname in (groups['paperless'] | default([]))
                else []
              )
            + (add_immich_admin_scripts_service_groups | default([]))
          }}
        add_admin_scripts_extra_scripts: >-
          {{
            (
              add_paperless_admin_scripts_extra_scripts | default([])
              if inventory_hostname in (groups['paperless'] | default([]))
              else []
