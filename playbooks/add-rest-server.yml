---
- name: Build and install rest-server on backup hosts
  hosts: restic_server
  become: true
  gather_facts: true

  roles:
    - role: add_restic_server
    - role: add_rclone
    - role: add_admin_scripts
      vars:
        add_admin_scripts_service_groups: >-
          {{
            (add_restic_server_admin_scripts_service_groups | default([]))
            + (add_rclone_admin_scripts_service_groups | default([]))
            + (add_restic_retention_admin_scripts_service_groups | default([]))
          }}
        add_admin_scripts_extra_scripts: >-
          {{
            (add_rclone_admin_scripts_extra_scripts | default([]))
            + (add_restic_retention_admin_scripts_extra_scripts | default([]))
          }}

  post_tasks:
    - name: Record deployment history for backup service stack
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_playbook: add-rest-server.yml
        record_deployment_roles:
          - add_restic_server
          - add_rclone
          - add_admin_scripts
        record_deployment_metadata:
          services:
            - rest-server
            - rclone
