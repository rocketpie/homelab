---
- name: Build and install rest-server on backup hosts
  hosts: restic_server
  become: true
  gather_facts: true

  roles:
    - role: add_restic_server
    - role: add_rclone

  post_tasks:
    - name: Record deployment history for backup service stack
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_playbook: add-rest-server.yml
        record_deployment_roles:
          - add_restic_server
          - add_rclone
        record_deployment_metadata:
          services:
            - rest-server
            - rclone
