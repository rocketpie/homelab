---
- name: Provision VM on Proxmox via autoinstall ISO
  hosts: localhost
  connection: local
  gather_facts: false

  vars_prompt:
    - name: vm_name
      private: false
      prompt: "VM to provision? a matching host_vars file must exist."
      default: restic1

  tasks:
    - name: Ensure target VM exists in inventory
      ansible.builtin.assert:
        that:
          - vm_name in hostvars
        fail_msg: "Host '{{ vm_name }}' is not defined in inventory"
    
    - name: Materialize selected VM vars
      ansible.builtin.set_fact:
        vm: "{{ hostvars[vm_name] }}"

    - name: Show selected VM
      ansible.builtin.debug:
        msg: 
          - "vm_name: {{ vm_name }}"
          - "vm.vmid: {{ vm.vmid }}"
          - "vm.username: {{ vm.username }}"

    - name: Export autoinstall seed for target VM
      ansible.builtin.include_role:
        name: export-autoinstall-seed

    - name: Run Proxmox API preflight checks
      ansible.builtin.include_role:
        name: proxmox-api-preflight

    - name: Create VM shell with disk + NIC + ISO
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ vm.proxmox_node }}"
        vmid: "{{ vm.vmid }}"
        name: "{{ vm_name }}"
        ostype: "{{ vm.proxmox_ostype }}"
        cores: "{{ vm.cores }}"
        memory: "{{ vm.memory_mb }}"
        scsihw: virtio-scsi-pci

        # Disk (SCSI)
        scsi:
          scsi0: "{{ proxmox_api_vm_storage }}:{{ vm.os_disk_gb }},format=raw"

        # NIC
        net:
          net0: "virtio,bridge={{ proxmox_api_default_bridge }}"

        # CD-ROM (IDE)
        ide:
          ide2: "{{ proxmox_api_iso_storage }}:iso/{{ vm.proxmox_iso_filename }},media=cdrom"

        # Boot order (Disk first, then CD)
        boot: "order=scsi0;ide2"

        agent: 1
        state: present

    - name: Start VM (installer will autoinstall)
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ vm.proxmox_node }}"
        vmid: "{{ vm.vmid }}"
        state: started

    - name: Wait for install to finish and VM to power off
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ vm.proxmox_node }}/qemu/{{ vm.vmid }}/status/current"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: vm_status
      changed_when: false
      until: vm_status.json.data.status == 'stopped'
      retries: 180
      delay: 10

    - name: Remove installer ISO / CD-ROM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ vm.proxmox_node }}"
        vmid: "{{ vm.vmid }}"
        update: true
        ide:
          ide2: none
        boot: "order=scsi0"

    - name: Boot installed system
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ vm.proxmox_node }}"
        vmid: "{{ vm.vmid }}"
        state: started

    - name: Wait for qemu-guest-agent to report a non-loopback IPv4
      vars:
        agent_url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ vm.proxmox_node }}/qemu/{{ vm.vmid }}/agent/network-get-interfaces"
      ansible.builtin.uri:
        url: "{{ agent_url }}"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: agent_net
      changed_when: false
      until: >
        (
          agent_net.json.data.result
          | default([])
          | rejectattr('name', 'equalto', 'lo')
          | map(attribute='ip-addresses')
          | flatten
          | selectattr('ip-address-type', 'equalto', 'ipv4')
          | rejectattr('ip-address', 'match', '^127\.')
          | rejectattr('ip-address', 'match', '^169\.254\.')
          | map(attribute='ip-address')
          | list
          | length
        ) > 0
      retries: 90
      delay: 10

    - name: Pick first non-local IPv4 from agent data
      ansible.builtin.set_fact:
        vm_ip: >-
          {{
            (
              agent_net.json.data.result
              | default([])
              | rejectattr('name', 'equalto', 'lo')
              | map(attribute='ip-addresses')
              | flatten
              | selectattr('ip-address-type', 'equalto', 'ipv4')
              | rejectattr('ip-address', 'match', '^127\.')
              | rejectattr('ip-address', 'match', '^169\.254\.')
              | map(attribute='ip-address')
              | first
            )
          }}

    - name: Wait for SSH to come up
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 1200

    - name: Remove old SSH host key for this IP
      ansible.builtin.command:
        cmd: "ssh-keygen -R {{ vm_ip }}"
      changed_when: false
      failed_when: false

    - name: Add new VM to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: archivar
        ansible_python_interpreter: /usr/bin/python3
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') + '/.ssh/lars-co3d-ed25519' }}"
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile={{ lookup('env', 'HOME') + '/.ssh/known_hosts' }}
        groups: new_vms

- name: Post-install configuration
  hosts: new_vms
  gather_facts: false
  tasks:
    - name: Ping over SSH
      ansible.builtin.ping:
