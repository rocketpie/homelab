---
- name: Provision VM on Proxmox via autoinstall ISO
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Prompt for VM to provision when not provided
      ansible.builtin.pause:
        prompt: "VM to provision? a matching host_vars file must exist. [{{ autoinstall_default_vm_name }}]"
      register: provision_vm_name_prompt

    - name: Resolve VM name for provisioning
      ansible.builtin.set_fact:
        vm_name: "{{ (provision_vm_name_prompt.user_input | default('', true) | trim) or autoinstall_default_vm_name }}"
      when: vm_name is not defined

    - name: Ensure target VM exists in inventory
      ansible.builtin.assert:
        that:
          - vm_name in hostvars
        fail_msg: "Host '{{ vm_name }}' is not defined in inventory"

    - name: Materialize selected VM vars with normalized extra disks
      ansible.builtin.set_fact:
        vm: >-
          {{
            (hostvars[vm_name] | to_json | from_json)
            | combine({
                'extra_disks': normalized_extra_disks
              }, recursive=True)
          }}
      vars:
        normalized_extra_disks: >-
          {%- set result = [] -%}
          {%- for d in hostvars[vm_name].extra_disks | default([]) -%}
          {%- set raw_name = (
                d.mount_path
                | basename
                | lower
                | regex_replace('\W+', '-')
                | regex_replace('^-+|-+$', '')
            ) -%}
          {%- set short_name = (
                (raw_name if raw_name | length > 0 else 'disk')
                | truncate(15, True, '')
            ) -%}
          {%- set hash_suffix = (d.mount_path | hash('sha1'))[:4] -%}
          {%- set derived_disk_id = d.disk_id | default(short_name ~ '-' ~ hash_suffix) -%}
          {%- set _ = result.append(
                d | combine({
                  'disk_id': derived_disk_id
                }, recursive=True)
              ) -%}
          {%- endfor -%}
          {{ result }}

    - name: Ensure extra disk mount paths are unique
      ansible.builtin.assert:
        that:
          - (vm.extra_disks | map(attribute='mount_path') | list | unique | length)
            == (vm.extra_disks | length)
        fail_msg: "extra_disks mount_path values must be unique"
      when: vm.extra_disks | default([]) | length > 0

    - name: Ensure derived extra disk IDs are non-empty and unique
      ansible.builtin.assert:
        that:
          - (vm.extra_disks | map(attribute='disk_id') | reject('equalto', '') | list | length)
            == (vm.extra_disks | length)
          - (vm.extra_disks | map(attribute='disk_id') | list | unique | length)
            == (vm.extra_disks | length)
        fail_msg: "Derived extra_disks disk_id values are empty or not unique"
      when: vm.extra_disks | default([]) | length > 0

    - name: Show selected VM
      ansible.builtin.debug:
        msg:
          - "vm_name: {{ vm_name }}"
          - "vm.vmid: {{ vm.vmid }}"
          - "vm.ansible_user: {{ vm.ansible_user }}"
          - "vm.host_users: {{ vm.host_users | default([]) | map(attribute='name') | list }}"
        verbosity: 1

    - name: Export autoinstall seed for target VM
      ansible.builtin.include_role:
        name: export-autoinstall-seed

    - name: Run Proxmox API preflight checks
      ansible.builtin.include_role:
        name: proxmox-api-preflight

    - name: Create VM
      ansible.builtin.include_role:
        name: proxmox-api-vm-create

    - name: Wait for qemu-guest-agent to report a non-loopback IPv4
      vars:
        agent_url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ vm.proxmox_node }}/qemu/{{ vm.vmid }}/agent/network-get-interfaces"
      ansible.builtin.uri:
        url: "{{ agent_url }}"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: agent_net
      changed_when: false
      until: >
        (
          agent_net.json.data.result
          | default([])
          | rejectattr('name', 'equalto', 'lo')
          | map(attribute='ip-addresses')
          | flatten
          | selectattr('ip-address-type', 'equalto', 'ipv4')
          | rejectattr('ip-address', 'match', '^127\.')
          | rejectattr('ip-address', 'match', '^169\.254\.')
          | map(attribute='ip-address')
          | list
          | length
        ) > 0
      retries: 90
      delay: 10

    - name: Pick first non-local IPv4 from agent data
      ansible.builtin.set_fact:
        vm_ip: >-
          {{
            (
              agent_net.json.data.result
              | default([])
              | rejectattr('name', 'equalto', 'lo')
              | map(attribute='ip-addresses')
              | flatten
              | selectattr('ip-address-type', 'equalto', 'ipv4')
              | rejectattr('ip-address', 'match', '^127\.')
              | rejectattr('ip-address', 'match', '^169\.254\.')
              | map(attribute='ip-address')
              | first
            )
          }}

    - name: Wait for SSH to come up
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 1200

    - name: Remove old SSH host key for this IP
      ansible.builtin.command:
        cmd: "ssh-keygen -R {{ vm_ip }}"
      changed_when: false
      failed_when: false

    - name: Add new VM to in-memory inventory
      ansible.builtin.add_host:
        vm: "{{ vm }}"
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: "{{ vm.ansible_user }}"
        ansible_python_interpreter: "{{ vm.ansible_python_interpreter }}"
        ansible_ssh_private_key_file: "{{ vm.ansible_ssh_private_key_file }}"
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile={{ lookup('env', 'HOME') + '/.ssh/known_hosts' }}
        groups: provisioned_vms

- name: Assert SSH works to provisioned VM
  hosts: provisioned_vms
  gather_facts: false
  tasks:
    - name: Ping over SSH
      ansible.builtin.ping:

- name: Configure provisioned VM
  hosts: provisioned_vms
  become: true
  gather_facts: true

  tasks:
    - name: Configure extra disks inside guest
      ansible.builtin.include_role:
        name: guest-extra-disks
      vars:
        guest_extra_disks: "{{ vm.extra_disks | default([]) }}"
      when: vm.extra_disks | default([]) | length > 0

    - name: Reboot VM after guest disk configuration
      ansible.builtin.reboot:
        reboot_timeout: 1200
        test_command: whoami
      when: vm.extra_disks | default([]) | length > 0

    - name: Verify extra disks are mounted after reboot
      ansible.builtin.command:
        cmd: "mountpoint -q {{ item.mount_path }}"
      changed_when: false
      loop: "{{ vm.extra_disks | default([]) }}"
      loop_control:
        label: "{{ item.mount_path }}"
      when: vm.extra_disks | default([]) | length > 0

    - name: Verify mounted filesystem source by UUID is present in fstab
      ansible.builtin.command:
        cmd: "findmnt --target {{ item.mount_path }} --noheadings --output SOURCE,TARGET,FSTYPE,OPTIONS"
      changed_when: false
      loop: "{{ vm.extra_disks | default([]) }}"
      loop_control:
        label: "{{ item.mount_path }}"
      register: mounted_filesystems
      when: vm.extra_disks | default([]) | length > 0

    - name: Show mounted extra disk details
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
        verbosity: 1
      loop: "{{ mounted_filesystems.results }}"
      loop_control:
        label: "{{ item.item.mount_path }}"
      when: vm.extra_disks | default([]) | length > 0
