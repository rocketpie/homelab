- name: Validate required vars for Proxmox API preflight
  ansible.builtin.assert:
    that:
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_api_verify_ssl is defined
      - proxmox_api_vm_storage is defined
      - proxmox_api_iso_storage is defined
    fail_msg: "Missing required vars for proxmox-api-preflight"

- name: Show API identity used
  ansible.builtin.debug:
    msg:
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      vm_storage: "{{ proxmox_api_vm_storage }}"
      iso_storage: "{{ proxmox_api_iso_storage }}"
    verbosity: 1

- name: Query Proxmox API permissions for current token user
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:8006/api2/json/access/permissions?userid={{ proxmox_api_user }}"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    return_content: true
  register: proxmox_api_permissions_response

- name: Show relevant permission slices
  ansible.builtin.debug:
    msg:
      proxmox_api_permissions: "{{ proxmox_api_permissions_response.json.data }}"
    verbosity: 2

- name: Assert token has required permissions for VM creation
  ansible.builtin.assert:
    that:
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_vm_storage] is defined
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_vm_storage]['Datastore.Allocate'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_vm_storage]['Datastore.AllocateSpace'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_vm_storage]['Datastore.Audit'] | default(0) | int == 1

      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_iso_storage] is defined
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_iso_storage]['Datastore.AllocateSpace'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/storage/' ~ proxmox_api_iso_storage]['Datastore.Audit'] | default(0) | int == 1

      - proxmox_api_permissions_response.json.data['/vms'] is defined
      - proxmox_api_permissions_response.json.data['/vms']['VM.Allocate'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Audit'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Backup'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Clone'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.CDROM'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.CPU'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.Cloudinit'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.Disk'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.HWType'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.Memory'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.Network'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Config.Options'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Migrate'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.Monitor'] | default(0) | int == 1
      - proxmox_api_permissions_response.json.data['/vms']['VM.PowerMgmt'] | default(0) | int == 1

    fail_msg: "Proxmox API token is missing one or more permissions required for VM creation"
