---
add_rclone_version: "1.71.2"
add_rclone_archive_filename: >-
  rclone-v{{ add_rclone_version }}-linux-amd64.zip
add_rclone_archive_url: >-
  https://downloads.rclone.org/v{{ add_rclone_version }}/{{ add_rclone_archive_filename }}
add_rclone_archive_path: >-
  /var/tmp/{{ add_rclone_archive_filename }}
add_rclone_extract_dir: >-
  /usr/local/src/rclone-v{{ add_rclone_version }}-linux-amd64
add_rclone_binary_source_path: "{{ add_rclone_extract_dir }}/rclone"
add_rclone_binary_path: /usr/local/bin/rclone

add_rclone_packages:
  - ca-certificates
  - unzip

add_rclone_service_user: root
add_rclone_service_group: "{{ add_rclone_service_user }}"

add_rclone_config_dir: /etc/rclone
add_rclone_config_file: "{{ add_rclone_config_dir }}/rclone.conf"
add_rclone_remote_config_content: ""

add_rclone_cache_dir: /var/cache/rclone
add_rclone_script_path: /usr/local/bin/rclone-sync

add_rclone_service_name: rclone-sync.service
add_rclone_service_unit_path: >-
  /etc/systemd/system/{{ add_rclone_service_name }}
add_rclone_timer_name: rclone-sync.timer
add_rclone_timer_unit_path: >-
  /etc/systemd/system/{{ add_rclone_timer_name }}

add_rclone_source_path: ""
add_rclone_remote_path: ""
add_rclone_operation: sync
add_rclone_flags:
  - --fast-list
  - --checksum
  - --transfers=4
  - --checkers=8
  - --stats=1m
  - --stats-one-line

add_rclone_timer_on_boot_sec: 30m
add_rclone_timer_on_unit_active_sec: 24h

add_rclone_admin_scripts_service_groups:
  - key: "rclone-sync"
    label: "rclone sync"
    status_units:
      - "{{ add_rclone_service_name }}"
      - "{{ add_rclone_timer_name }}"
    start_enable_units:
      - "{{ add_rclone_timer_name }}"
    start_start_units: []
    stop_disable_units:
      - "{{ add_rclone_timer_name }}"
    stop_stop_units:
      - "{{ add_rclone_service_name }}"

add_rclone_admin_scripts_extra_scripts:
  - name: "pull-rclone-remote"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      echo "Pulling from {{ add_rclone_remote_path }} to {{ add_rclone_source_path }}"
      echo "This performs a one-shot recovery copy from the remote to the local path."
      echo "Existing local files are not deleted."

      exec sudo --user "{{ add_rclone_service_user }}" -- \
        {{ add_rclone_binary_path | quote }} \
        copy \
        {{ add_rclone_remote_path | quote }} \
        {{ add_rclone_source_path | quote }} \
      {% for flag in add_rclone_flags %}
        {{ flag | quote }} \
      {% endfor %}
        --config {{ add_rclone_config_file | quote }}
