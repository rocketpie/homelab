---
- name: Skip when no extra disks are defined
  ansible.builtin.meta: end_host
  when: configure_disks_items | length == 0

- name: Validate extra disk definitions
  ansible.builtin.assert:
    that:
      - item.disk_id is defined
      - item.disk_id | length > 0
      - item.disk_gb is defined
      - item.disk_gb | int > 0
      - item.mount_path is defined
      - item.mount_path | length > 1
    fail_msg: "Invalid extra_disks entry: {{ item | to_nice_yaml }}"
  loop: "{{ configure_disks_items }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Validate disk_id uniqueness
  ansible.builtin.assert:
    that:
      - (configure_disks_items | map(attribute='disk_id') | list | unique | length)
        == (configure_disks_items | length)
    fail_msg: "extra_disks[].disk_id values must be unique"

- name: Validate mount_path uniqueness
  ansible.builtin.assert:
    that:
      - (configure_disks_items | map(attribute='mount_path') | list | unique | length)
        == (configure_disks_items | length)
    fail_msg: "extra_disks[].mount_path values must be unique"

- name: Build normalized extra disk list
  ansible.builtin.set_fact:
    configure_disks_normalized: >-
      {{
        configure_disks_normalized | default([]) + [
          item | combine({
            'fs_type': item.fs_type | default(configure_disks_fs_type_default),
            'mount_options': item.mount_options | default(configure_disks_mount_options_default),
            'disk_by_id_path': '/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_' ~ item.disk_id
          })
        ]
      }}
  loop: "{{ configure_disks_items }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Check disk by-id paths exist
  ansible.builtin.stat:
    path: "{{ item.disk_by_id_path }}"
  loop: "{{ configure_disks_normalized }}"
  loop_control:
    label: "{{ item.disk_id }}"
  register: configure_disks_path_stats

- name: Fail when expected extra disk is missing in guest
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected disk path not found in guest: {{ item.item.disk_by_id_path }}"
  loop: "{{ configure_disks_path_stats.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Resolve canonical disk device path
  ansible.builtin.command:
    cmd: "readlink -f {{ item.disk_by_id_path }}"
  loop: "{{ configure_disks_normalized }}"
  loop_control:
    label: "{{ item.disk_id }}"
  register: configure_disks_realpaths
  changed_when: false

- name: Build resolved disk map
  ansible.builtin.set_fact:
    configure_disks_resolved: >-
      {{
        configure_disks_resolved | default([]) + [
          item.item | combine({
            'disk_device': item.stdout
          })
        ]
      }}
  loop: "{{ configure_disks_realpaths.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Inspect block devices as JSON
  ansible.builtin.command:
    cmd: >
      lsblk --json --output
      NAME,KNAME,PATH,PKNAME,TYPE,FSTYPE,UUID,MOUNTPOINTS,PTTYPE {{ item.disk_device }}
  loop: "{{ configure_disks_resolved }}"
  loop_control:
    label: "{{ item.disk_id }}"
  register: configure_disks_lsblk
  changed_when: false

- name: Parse lsblk output into disk facts
  ansible.builtin.set_fact:
    configure_disks_inspected: >-
      {{
        configure_disks_inspected | default([]) + [
          item.item | combine({
            'lsblk': (item.stdout | from_json).blockdevices[0]
          })
        ]
      }}
  loop: "{{ configure_disks_lsblk.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Fail if whole disk already has mounted filesystem
  ansible.builtin.assert:
    that:
      - item.lsblk.mountpoints is not defined
        or (item.lsblk.mountpoints | reject('equalto', None) | list | length == 0)
    fail_msg: >-
      Disk {{ item.disk_device }} for {{ item.disk_id }} already appears mounted:
      {{ item.lsblk.mountpoints | default([]) }}
  loop: "{{ configure_disks_inspected }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Create GPT label when missing
  ansible.builtin.command:
    argv:
      - parted
      - --script
      - "{{ item.disk_device }}"
      - mklabel
      - gpt
  changed_when: true
  when: item.lsblk.pttype | default('') == ''
  loop: "{{ configure_disks_inspected }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Refresh kernel partition table view
  ansible.builtin.command:
    cmd: "udevadm settle"
  changed_when: false

- name: Create single primary partition when missing
  community.general.parted:
    device: "{{ item.disk_device }}"
    number: 1
    state: present
    part_start: "1MiB"
    part_end: "100%"
  when: (item.lsblk.children | default([]) | length) == 0
  loop: "{{ configure_disks_inspected }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Refresh block device view after partitioning
  ansible.builtin.command:
    cmd: >
      lsblk --json --output
      NAME,KNAME,PATH,PKNAME,TYPE,FSTYPE,UUID,MOUNTPOINTS,PTTYPE {{ item.disk_device }}
  loop: "{{ configure_disks_inspected }}"
  loop_control:
    label: "{{ item.disk_id }}"
  register: configure_disks_postpart_lsblk
  changed_when: false

- name: Show post-partition lsblk summary
  ansible.builtin.debug:
    msg:
      disk_id: "{{ item.item.disk_id }}"
      disk_device: "{{ item.item.disk_device }}"
      root_blockdevice: "{{ (item.stdout | from_json).blockdevices[0] }}"
      child_count: "{{ ((item.stdout | from_json).blockdevices[0].children | default([], true)) | length }}"
      first_child: "{{ ((item.stdout | from_json).blockdevices[0].children | default([], true) | first) | default({}, true) }}"
    verbosity: 1
  loop: "{{ configure_disks_postpart_lsblk.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Show post-partition lsblk raw JSON
  ansible.builtin.debug:
    msg: |
      disk_id: {{ item.item.disk_id }}
      disk_device: {{ item.item.disk_device }}
      lsblk_json:
      {{ item.stdout | from_json | to_nice_json }}
    verbosity: 2
  loop: "{{ configure_disks_postpart_lsblk.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Build final partition targets
  ansible.builtin.set_fact:
    configure_disks_final: >-
      {{
        configure_disks_final | default([]) + [
          item.item | combine({
            'partition': ((item.stdout | from_json).blockdevices[0].children[0].path),
            'partition_fstype': (((item.stdout | from_json).blockdevices[0].children[0].fstype | default('', true)) | string),
            'partition_uuid': (((item.stdout | from_json).blockdevices[0].children[0].uuid | default('', true)) | string)
          })
        ]
      }}
  loop: "{{ configure_disks_postpart_lsblk.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Fail on unexpected existing filesystem type
  ansible.builtin.assert:
    that:
      - not (
          configure_disks_fail_on_fs_type_mismatch
          and (item.partition_fstype | default('', true) | length > 0)
          and (item.partition_fstype | default('', true) != item.fs_type)
        )
    fail_msg: >-
      Disk {{ item.disk_id }} already has filesystem
      {{ item.partition_fstype | default('none', true) }},
      expected {{ item.fs_type }}.
  loop: "{{ configure_disks_final }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Create filesystem when missing
  community.general.filesystem:
    dev: "{{ item.partition }}"
    fstype: "{{ item.fs_type }}"
  when: item.partition_fstype | default('', true) | length == 0
  loop: "{{ configure_disks_final }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Read blkid UUID after filesystem creation
  ansible.builtin.command:
    cmd: "blkid -o export {{ item.partition }}"
  loop: "{{ configure_disks_final }}"
  loop_control:
    label: "{{ item.disk_id }}"
  register: configure_disks_blkid
  changed_when: false

- name: Build mount definitions
  ansible.builtin.set_fact:
    configure_disks_mounts: >-
      {{
        configure_disks_mounts | default([]) + [
          item.item | combine({
            'mount_uuid': (
              item.stdout_lines
              | select('match', '^UUID=')
              | first
              | regex_replace('^UUID=', '')
            )
          })
        ]
      }}
  loop: "{{ configure_disks_blkid.results }}"
  loop_control:
    label: "{{ item.item.disk_id }}"

- name: Ensure mount directories exist
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ configure_disks_mounts }}"
  loop_control:
    label: "{{ item.disk_id }}"

- name: Mount and persist extra disks by UUID
  ansible.posix.mount:
    path: "{{ item.mount_path }}"
    src: "UUID={{ item.mount_uuid }}"
    fstype: "{{ item.fs_type }}"
    opts: "{{ item.mount_options }}"
    state: mounted
  loop: "{{ configure_disks_mounts }}"
  loop_control:
    label: "{{ item.disk_id }}"
