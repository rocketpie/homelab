---
- name: Validate host platform for Docker install
  ansible.builtin.assert:
    that:
      - ansible_facts['system'] == 'Linux'
      - ansible_facts['distribution'] == 'Ubuntu'
    fail_msg: "add_docker currently supports Ubuntu Linux hosts only."

- name: Check whether configured Docker users exist
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ item }}"
  register: add_docker_user_getent_results
  changed_when: false
  failed_when: false
  loop: "{{ add_docker_users }}"
  loop_control:
    label: "{{ item }}"

- name: Assert configured Docker users exist
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Configured add_docker_users entry does not exist on host: {{ item.item }}"
  loop: "{{ add_docker_user_getent_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: Validate configured Docker reverse proxy bindings
  ansible.builtin.assert:
    that:
      - item.port is defined
      - item.port | int > 0
      - item.port | int < 65536
      - item.hostnames is defined
      - item.hostnames is sequence
      - item.hostnames is not string
      - item.hostnames | length > 0
      - >-
        (
          item.hostnames
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (item.hostnames | length)
      - >-
        (
          item.backend_host is not defined
        )
        or
        (
          item.backend_host | string | trim | length > 0
        )
    fail_msg: >-
      Invalid add_docker_reverse_proxy_bindings item: {{ item | to_nice_yaml }}
  loop: "{{ add_docker_reverse_proxy_bindings }}"
  loop_control:
    label: "{{ item.port | default('unnamed-binding') }}"

- name: Assert Docker reverse proxy hostnames are unique
  ansible.builtin.assert:
    that:
      - >-
        (
          add_docker_reverse_proxy_bindings
          | map(attribute='hostnames')
          | flatten
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | unique
          | length
        )
        ==
        (
          add_docker_reverse_proxy_bindings
          | map(attribute='hostnames')
          | flatten
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        )
    fail_msg: "add_docker_reverse_proxy_bindings hostnames must be unique"

- name: Assert Docker reverse proxy TLS assets exist on the controller
  ansible.builtin.assert:
    that:
      - query('ansible.builtin.fileglob', add_docker_reverse_proxy_ca_cert_src) | length == 1
      - query('ansible.builtin.fileglob', add_docker_reverse_proxy_tls_cert_src) | length == 1
      - query('ansible.builtin.fileglob', add_docker_reverse_proxy_tls_key_src) | length == 1
    fail_msg: >-
      Missing Docker reverse proxy TLS assets on the controller. Expected:
      ca={{ add_docker_reverse_proxy_ca_cert_src }},
      cert={{ add_docker_reverse_proxy_tls_cert_src }},
      key={{ add_docker_reverse_proxy_tls_key_src }}.
  when: add_docker_reverse_proxy_enabled | bool

- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name: "{{ add_docker_prerequisite_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: "{{ add_docker_keyring_dir }}"
    state: directory
    mode: "0755"

- name: Download Docker apt repository GPG key
  ansible.builtin.get_url:
    url: "{{ add_docker_repo_gpg_url }}"
    dest: "{{ add_docker_keyring_path }}"
    mode: "0644"

- name: Materialize dpkg architecture
  ansible.builtin.command:
    argv:
      - dpkg
      - --print-architecture
  register: add_docker_architecture
  changed_when: false

- name: Install Docker apt repository
  ansible.builtin.copy:
    dest: "{{ add_docker_repo_path }}"
    mode: "0644"
    content: >-
      deb [arch={{ add_docker_architecture.stdout | trim }}
      signed-by={{ add_docker_keyring_path }}]
      {{ add_docker_repo_url }} {{ ansible_facts['distribution_release'] }} stable

- name: Install Docker engine packages
  ansible.builtin.apt:
    name: "{{ add_docker_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started

- name: Ensure HAProxy certificate directory exists
  ansible.builtin.file:
    path: "{{ add_docker_haproxy_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: add_docker_reverse_proxy_enabled | bool

- name: Install homelab CA certificate on Docker host
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', add_docker_reverse_proxy_ca_cert_src) }}"
    dest: "{{ add_docker_host_ca_cert_path }}"
    owner: root
    group: root
    mode: "0644"
  register: add_docker_ca_cert_install
  when: add_docker_reverse_proxy_enabled | bool

- name: Refresh host CA trust store
  ansible.builtin.command:
    cmd: update-ca-certificates
  when:
    - add_docker_reverse_proxy_enabled | bool
    - add_docker_ca_cert_install.changed

- name: Install HAProxy TLS certificate bundle
  ansible.builtin.copy:
    content: |-
      {{ lookup('ansible.builtin.file', add_docker_reverse_proxy_tls_cert_src) | trim }}
      {{ lookup('ansible.builtin.file', add_docker_reverse_proxy_tls_key_src) | trim }}
    dest: "{{ add_docker_haproxy_tls_pem_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart HAProxy
  when: add_docker_reverse_proxy_enabled | bool

- name: Render HAProxy reverse proxy config
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ add_docker_haproxy_config_path }}"
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  notify: Restart HAProxy
  when: add_docker_reverse_proxy_enabled | bool

- name: Flush HAProxy handler after config changes
  ansible.builtin.meta: flush_handlers
  when: add_docker_reverse_proxy_enabled | bool

- name: Ensure HAProxy service matches desired Docker reverse proxy state
  ansible.builtin.systemd_service:
    name: "{{ add_docker_haproxy_service_name }}"
    enabled: "{{ add_docker_reverse_proxy_enabled | bool }}"
    state: "{{ 'started' if add_docker_reverse_proxy_enabled | bool else 'stopped' }}"

- name: Ensure configured users can access Docker
  ansible.builtin.user:
    name: "{{ item }}"
    groups:
      - docker
    append: true
  loop: "{{ add_docker_users }}"
  loop_control:
    label: "{{ item }}"
