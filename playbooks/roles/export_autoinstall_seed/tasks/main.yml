- name: Validate required variables for autoinstall seed export
  ansible.builtin.assert:
    that:
      - vm_name is defined
      - vm.ansible_user is defined
      - shared_admin_users is defined
      - autoinstall_export_directory is defined
      - autoinstall_base_url is defined
      - autoinstall_controller_probe_url is defined
      - autoinstall_start_server_workdir is defined
    fail_msg: "Missing required variables for export_autoinstall_seed role"

- name: Validate static network variables for VM autoinstall
  ansible.builtin.assert:
    that:
      - vm.ansible_host is defined
      - vm.ansible_host | length > 0
      - autoinstall_vm_ipv4_prefix is defined
      - autoinstall_vm_ipv4_gateway is defined
      - autoinstall_vm_ipv4_nameservers is defined
      - autoinstall_vm_ipv4_nameservers | length > 0
    fail_msg: "Missing required static network variables for VM autoinstall"

- name: Resolve host-specific VM users
  ansible.builtin.set_fact:
    export_autoinstall_seed_vm_host_users: >-
      {%- set result = [] -%}
      {%- set host_users = vm.host_users | default([]) -%}
      {%- set password_map = vm.host_user_passwords | default({}) -%}
      {%- for user in host_users -%}
      {%- set lock_passwd = user.lock_passwd | default(false) | bool -%}
      {%- set password = password_map.get(user.name) -%}
      {%- set has_password = (password | default('', true) | string | length) > 0 -%}
      {%- set password_hash = (password | ansible.builtin.password_hash('sha512')) if (not lock_passwd and has_password) else omit -%}
      {%- set resolved_user = user | combine({'gecos': user.description | default(user.name)}, recursive=True) -%}
      {%- if password_hash is not sameas omit -%}
      {%- set resolved_user = resolved_user | combine({'password_hash': password_hash}, recursive=True) -%}
      {%- endif -%}
      {%- set _ = result.append(resolved_user) -%}
      {%- endfor -%}
      {{ result }}
  no_log: true

- name: Build VM provisioning user list
  ansible.builtin.set_fact:
    export_autoinstall_seed_vm_users: "{{ (shared_admin_users | default([])) + (export_autoinstall_seed_vm_host_users | default([])) }}"

- name: Ensure VM provisioning user list is not empty
  ansible.builtin.assert:
    that:
      - export_autoinstall_seed_vm_users | length > 0
      - vm.ansible_user in (export_autoinstall_seed_vm_users | map(attribute='name') | list)
      - (export_autoinstall_seed_vm_users | map(attribute='name') | list | unique | length) == (export_autoinstall_seed_vm_users | length)
    fail_msg: "VM users must include the inventory ansible_user and use unique names"

- name: Validate VM user definitions
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.ssh_authorized_keys is defined
      - item.ssh_authorized_keys | length > 0
      - (item.lock_passwd | default(false) | bool)
        or ((item.password_hash | default('', true) | string | length) > 0)
    fail_msg: "Invalid VM user definition for {{ item.name | default('unnamed-user') }}"
  loop: "{{ export_autoinstall_seed_vm_users }}"
  loop_control:
    label: "{{ item.name | default('unnamed-user') }}"

- name: Ensure autoinstall export directory exists
  ansible.builtin.file:
    path: "{{ autoinstall_export_directory }}"
    state: directory
    mode: "0755"

- name: Export autoinstall user-data
  ansible.builtin.template:
    src: user-data.j2
    dest: "{{ autoinstall_export_directory }}/user-data"
    mode: "0644"

- name: Export autoinstall meta-data
  ansible.builtin.template:
    src: meta-data.j2
    dest: "{{ autoinstall_export_directory }}/meta-data"
    mode: "0644"

- name: Export autoinstall vendor-data
  ansible.builtin.template:
    src: vendor-data.j2
    dest: "{{ autoinstall_export_directory }}/vendor-data"
    mode: "0644"

- name: Check whether autoinstall user-data is being served
  ansible.builtin.uri:
    url: "{{ autoinstall_controller_probe_url }}/user-data"
    method: GET
    return_content: false
    status_code: 200
    timeout: 4
  register: export_autoinstall_seed_http_check
  failed_when: false
  changed_when: false

- name: Assert autoinstall seed server script is configured
  ansible.builtin.assert:
    that:
      - autoinstall_start_server_script is defined
      - autoinstall_start_server_script | string | trim | length > 0
    fail_msg: >-
      autoinstall_start_server_script is not set. Define it in a local file such as
      inventory/group_vars/all/autoinstall-local.yml, for example:
      autoinstall_start_server_script: "srv/Start-CaddyServer.ps1"
  when: export_autoinstall_seed_http_check.status | default(0) != 200

- name: Resolve autoinstall seed server launcher path
  ansible.builtin.set_fact:
    export_autoinstall_seed_start_server_script_path: >-
      {{
        autoinstall_start_server_script
        if (
          (autoinstall_start_server_script | string).startswith('../')
          or (autoinstall_start_server_script | string).startswith('./')
        )
        else '../' ~ (autoinstall_start_server_script | string)
      }}
  when: export_autoinstall_seed_http_check.status | default(0) != 200

- name: Check whether autoinstall seed server launcher exists
  ansible.builtin.stat:
    path: "{{ export_autoinstall_seed_start_server_script_path }}"
  register: export_autoinstall_seed_start_server_script_stat
  when: export_autoinstall_seed_http_check.status | default(0) != 200

- name: Assert autoinstall seed server launcher exists
  ansible.builtin.assert:
    that:
      - export_autoinstall_seed_start_server_script_stat.stat.exists
    fail_msg: >-
      Expected autoinstall launcher script was not found:
      {{ export_autoinstall_seed_start_server_script_path }}
      Set autoinstall_start_server_script in a local file such as
      inventory/group_vars/all/autoinstall-local.yml.
  when: export_autoinstall_seed_http_check.status | default(0) != 200

- name: Materialize autoinstall seed server command
  ansible.builtin.set_fact:
    export_autoinstall_seed_start_server_command: >-
      {{
        ['pwsh', '-File', export_autoinstall_seed_start_server_script_path]
        if (export_autoinstall_seed_start_server_script_path | lower).endswith('.ps1')
        else ['bash', export_autoinstall_seed_start_server_script_path]
      }}
  when: export_autoinstall_seed_http_check.status | default(0) != 200

- name: Start autoinstall seed server if user-data is not being served
  ansible.builtin.command:
    argv: "{{ export_autoinstall_seed_start_server_command }}"
    chdir: "{{ autoinstall_start_server_workdir }}"
  async: 3600
  poll: 0
  when: export_autoinstall_seed_http_check.status | default(0) != 200
  changed_when: true

- name: Wait until autoinstall user-data is reachable
  ansible.builtin.uri:
    url: "{{ autoinstall_controller_probe_url }}/user-data"
    method: GET
    return_content: false
    status_code: 200
  register: export_autoinstall_seed_http_ready
  retries: 3
  delay: 3
  until: export_autoinstall_seed_http_ready.status == 200
  changed_when: false
