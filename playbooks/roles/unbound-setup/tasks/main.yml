---
- name: Install Unbound packages
  ansible.builtin.apt:
    name: "{{ unbound_packages }}"
    state: present
    update_cache: true

- name: Ensure Unbound include directory exists
  ansible.builtin.file:
    path: "{{ unbound_include_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Unbound state directory exists
  ansible.builtin.file:
    path: "{{ unbound_blocklist_state_dir }}"
    state: directory
    owner: "{{ unbound_user }}"
    group: "{{ unbound_group }}"
    mode: "0755"

- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: "{{ unbound_resolved_dropin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable systemd-resolved DNS stub listener
  ansible.builtin.copy:
    dest: "{{ unbound_resolved_dropin_file }}"
    content: |
      [Resolve]
      DNSStubListener=no
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved

- name: Build manual DNS records from IP->aliases structure
  ansible.builtin.set_fact:
    unbound_manual_dns_records: "{{ lookup('template', 'dns-records-flatten.j2') }}"
  when: homelab_dns_records is defined and homelab_dns_records is mapping

- name: Initialize to empty list if no global records
  ansible.builtin.set_fact:
    unbound_manual_dns_records: []
  when: homelab_dns_records is not defined or homelab_dns_records is not mapping

- name: Collect host-level DNS aliases
  ansible.builtin.set_fact:
    unbound_host_dns_records: >-
      {%- set records = [] -%}
      {%- for host_name in groups['all'] | default([]) -%}
        {%- set host_aliases = hostvars[host_name].dns_aliases | default([]) -%}
        {%- set host_ip = hostvars[host_name].ansible_host | default('') -%}
        {%- if host_aliases and host_ip -%}
          {%- for alias in host_aliases -%}
            {{- records.append({'name': alias, 'value': host_ip}) -}}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{- records -}}
  when: unbound_inventory_dns_enabled | bool

- name: Initialize empty host records if not collecting
  ansible.builtin.set_fact:
    unbound_host_dns_records: []
  when: not (unbound_inventory_dns_enabled | bool)

- name: Merge manual records with host aliases
  ansible.builtin.set_fact:
    unbound_manual_dns_records: "{{ (unbound_manual_dns_records | default([])) + (unbound_host_dns_records | default([])) }}"

- name: Validate local DNS record definitions
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.value is defined
      - item.value | length > 0
    fail_msg: "Invalid homelab DNS record: {{ item | to_nice_yaml }}"
  loop: "{{ unbound_manual_dns_records }}"
  loop_control:
    label: "{{ item.name | default('unnamed-record') }}"

- name: Initialize inventory-derived DNS records
  ansible.builtin.set_fact:
    unbound_inventory_dns_records: []
    unbound_dns_record_map: {}

- name: Collect inventory-derived DNS records
  ansible.builtin.set_fact:
    unbound_inventory_dns_records: >-
      {{
        unbound_inventory_dns_records + [
          {
            'name': (hostvars[item].dns_name | default(item)),
            'value': hostvars[item].ansible_host
          }
        ]
      }}
  loop: "{{ groups['all'] | default([]) }}"
  when:
    - unbound_inventory_dns_enabled | bool
    - hostvars[item].ansible_host is defined
    - hostvars[item].ansible_host | string | length > 0
    - hostvars[item].dns_record_enabled | default(true) | bool
  loop_control:
    label: "{{ item }}"

- name: Seed DNS record map from inventory-derived records
  ansible.builtin.set_fact:
    unbound_dns_record_map: "{{ unbound_dns_record_map | combine({item.name: item}, recursive=True) }}"
  loop: "{{ unbound_inventory_dns_records }}"
  loop_control:
    label: "{{ item.name }}"

- name: Overlay manual DNS records onto DNS record map
  ansible.builtin.set_fact:
    unbound_dns_record_map: "{{ unbound_dns_record_map | combine({item.name: item}, recursive=True) }}"
  loop: "{{ unbound_manual_dns_records }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build effective DNS record list
  ansible.builtin.set_fact:
    unbound_effective_dns_records: "{{ unbound_dns_record_map | dict2items | map(attribute='value') | sort(attribute='name') }}"

- name: Render Unbound server config include
  ansible.builtin.template:
    src: homelab-server.conf.j2
    dest: "{{ unbound_server_config_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render local DNS records include
  ansible.builtin.template:
    src: homelab-records.conf.j2
    dest: "{{ unbound_local_records_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render Unbound forwarders include
  ansible.builtin.template:
    src: homelab-forwarders.conf.j2
    dest: "{{ unbound_forward_zone_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render blocklist source manifest
  ansible.builtin.template:
    src: homelab-blocklist.sources.j2
    dest: "{{ unbound_blocklist_sources_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Install blocklist refresh script
  ansible.builtin.template:
    src: unbound-refresh-blocklist.sh.j2
    dest: "{{ unbound_blocklist_refresh_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install blocklist refresh service unit
  ansible.builtin.template:
    src: unbound-refresh-blocklist.service.j2
    dest: "/etc/systemd/system/{{ unbound_blocklist_refresh_service_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install blocklist refresh timer unit
  ansible.builtin.template:
    src: unbound-refresh-blocklist.timer.j2
    dest: "/etc/systemd/system/{{ unbound_blocklist_refresh_timer_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Refresh blocklist configuration
  ansible.builtin.command:
    cmd: "{{ unbound_blocklist_refresh_script_path }}"
  changed_when: true
  when: unbound_blocklist_sources | length > 0

- name: Ensure empty blocklist include exists when no sources are configured
  ansible.builtin.copy:
    content: "# No blocklist sources configured\n"
    dest: "{{ unbound_blocklist_output_file }}"
    owner: root
    group: root
    mode: "0644"
  when: unbound_blocklist_sources | length == 0

- name: Validate Unbound configuration
  ansible.builtin.command:
    cmd: unbound-checkconf
  changed_when: false

- name: Stop Unbound before taking over DNS port 53
  ansible.builtin.service:
    name: "{{ unbound_service_name }}"
    state: stopped
  failed_when: false

- name: Flush handlers before starting Unbound
  ansible.builtin.meta: flush_handlers

- name: Inspect current port 53 listeners
  ansible.builtin.shell: |
    ss -H -ltnup '( sport = :53 )' || true
    ss -H -lunp '( sport = :53 )' || true
  args:
    executable: /bin/bash
  register: unbound_port_53_inspection
  changed_when: false

- name: Collect listener PIDs still holding port 53
  ansible.builtin.set_fact:
    unbound_port_53_listener_pids: >-
      {{
        unbound_port_53_inspection.stdout
        | regex_findall('pid=([0-9]+)')
        | unique
      }}

- name: Kill remaining processes holding port 53
  ansible.builtin.command:
    cmd: "kill -9 {{ unbound_port_53_listener_pids | join(' ') }}"
  when: unbound_port_53_listener_pids | length > 0
  changed_when: true

- name: Verify port 53 is free before starting Unbound
  ansible.builtin.shell: |
    ss -H -ltnup '( sport = :53 )' || true
    ss -H -lunp '( sport = :53 )' || true
  args:
    executable: /bin/bash
  register: unbound_port_53_after_reset
  changed_when: false
  failed_when: unbound_port_53_after_reset.stdout | trim | length > 0

- name: Ensure Unbound is running with the rendered configuration
  block:
    - name: Enable and start Unbound
      ansible.builtin.service:
        name: "{{ unbound_service_name }}"
        enabled: true
        state: started
  rescue:
    - name: Capture Unbound service status
      ansible.builtin.command:
        cmd: "systemctl status {{ unbound_service_name }} --no-pager --full"
      register: unbound_status_result
      changed_when: false
      failed_when: false

    - name: Capture recent Unbound journal entries
      ansible.builtin.command:
        cmd: "journalctl -xeu {{ unbound_service_name }} --no-pager -n 50"
      register: unbound_journal_result
      changed_when: false
      failed_when: false

    - name: Fail with Unbound startup diagnostics
      ansible.builtin.fail:
        msg: |
          Failed to start or reload {{ unbound_service_name }}.
          systemctl status:
          {{ unbound_status_result.stdout | default('(no output)') }}

          journalctl:
          {{ unbound_journal_result.stdout | default('(no output)') }}

- name: Enable and start blocklist refresh timer
  ansible.builtin.service:
    name: "{{ unbound_blocklist_refresh_timer_name }}"
    enabled: true
    state: started
