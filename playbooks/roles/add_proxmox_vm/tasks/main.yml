- name: Validate required variables for Proxmox VM create
  ansible.builtin.assert:
    that:
      - vm_name is defined
      - vm is defined
      - vm.vmid is defined
      - vm.proxmox_node is defined
      - vm.proxmox_ostype is defined
      - vm.proxmox_iso_filename is defined
      - vm.cores is defined
      - vm.memory_mb is defined
      - vm.os_disk_gb is defined
      - proxmox_api_host is defined
      - proxmox_api_user is defined
      - proxmox_api_token_id is defined
      - proxmox_api_token_secret is defined
      - proxmox_api_verify_ssl is defined
      - proxmox_api_iso_storage is defined
      - proxmox_api_vm_storage is defined
    fail_msg: "Missing required vars for add_proxmox_vm"

- name: Query existing Proxmox VMs
  community.proxmox.proxmox_vm_info:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
  register: add_proxmox_vm_existing_vms

- name: Fail if VM already exists by vmid or name
  ansible.builtin.assert:
    that:
      - (add_proxmox_vm_existing_vms.proxmox_vms | selectattr('vmid', 'equalto', (vm.vmid | int)) | list | length) == 0
      - (add_proxmox_vm_existing_vms.proxmox_vms | selectattr('name', 'defined') | selectattr('name', 'equalto', vm_name) | list | length) == 0
    fail_msg: "Refusing to create VM because vmid {{ vm.vmid }} or name {{ vm_name }} already exists"

- name: Materialize VM create parameters
  ansible.builtin.set_fact:
    add_proxmox_vm_bridge: "{{ vm.proxmox_bridge | default(proxmox_api_default_bridge) }}"
    add_proxmox_vm_agent: "{{ vm.proxmox_qemu_agent | default(add_proxmox_vm_qemu_agent) }}"
    add_proxmox_vm_provision_node: "{{ autoinstall_provision_proxmox_node }}"
    add_proxmox_vm_target_node: "{{ vm.proxmox_node }}"
    add_proxmox_vm_active_node: "{{ autoinstall_provision_proxmox_node }}"

- name: Show VM create inputs
  ansible.builtin.debug:
    msg:
      vm_name: "{{ vm_name }}"
      vmid: "{{ vm.vmid }}"
      provision_node: "{{ add_proxmox_vm_provision_node }}"
      target_node: "{{ add_proxmox_vm_target_node }}"
      ostype: "{{ vm.proxmox_ostype }}"
      cores: "{{ vm.cores }}"
      memory_mb: "{{ vm.memory_mb }}"
      os_disk_gb: "{{ vm.os_disk_gb }}"
      bridge: "{{ add_proxmox_vm_bridge }}"
      vm_storage: "{{ proxmox_api_vm_storage }}"
      iso_storage: "{{ proxmox_api_iso_storage }}"
      iso_filename: "{{ vm.proxmox_iso_filename }}"
      extra_disks: "{{ vm.extra_disks | default([]) }}"
    verbosity: 0

- name: Create VM via Proxmox API with OS disk only
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    node: "{{ add_proxmox_vm_provision_node }}"
    vmid: "{{ vm.vmid }}"
    name: "{{ vm_name }}"
    ostype: "{{ vm.proxmox_ostype }}"
    cores: "{{ autoinstall_provision_cores }}"
    memory: "{{ autoinstall_provision_memory_mb }}"
    scsihw: virtio-scsi-pci
    agent: "{{ 1 if add_proxmox_vm_agent else 0 }}"

    # NIC
    net:
      net0: "virtio,bridge={{ add_proxmox_vm_bridge }}"

    # OS Disk (SCSI)
    scsi:
      scsi0: "{{ proxmox_api_vm_storage }}:{{ vm.os_disk_gb }},format=raw"

    # boot iso (IDE CD-ROM)
    ide:
      ide2: "{{ proxmox_api_iso_storage }}:iso/{{ vm.proxmox_iso_filename }},media=cdrom"
    boot: "order=ide2"
    # create VM
    state: present
  register: add_proxmox_vm_create_result

- name: Start VM to start autoinstall
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    node: "{{ add_proxmox_vm_active_node }}"
    vmid: "{{ vm.vmid }}"
    state: started

- name: Wait for autoinstall to finish (VM will power off)
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ add_proxmox_vm_active_node }}/qemu/{{ vm.vmid }}/status/current"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    return_content: true
  register: add_proxmox_vm_status
  changed_when: false
  until: add_proxmox_vm_status.json.data.status == 'stopped'
  retries: 30
  delay: 30

- name: Remove installer ISO / CD-ROM via Proxmox API
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ add_proxmox_vm_active_node }}/qemu/{{ vm.vmid }}/config"
    method: PUT
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    body_format: form-urlencoded
    body:
      delete: "ide2"
      boot: "order=scsi0"
    return_content: true
  register: add_proxmox_vm_remove_iso_result

- name: Migrate stopped VM to target Proxmox node
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ add_proxmox_vm_provision_node }}/qemu/{{ vm.vmid }}/migrate"
    method: POST
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    body_format: form-urlencoded
    body:
      target: "{{ add_proxmox_vm_target_node }}"
      online: 0
      "with-local-disks": 1
      targetstorage: "{{ proxmox_api_vm_storage }}"
    return_content: true
  register: add_proxmox_vm_migrate_result
  when: add_proxmox_vm_provision_node != add_proxmox_vm_target_node

- name: Wait for Proxmox migration task to finish
  ansible.builtin.uri:
    url: >-
      https://{{ proxmox_api_host }}:8006/api2/json/nodes/
      {{ add_proxmox_vm_provision_node }}/tasks/
      {{ add_proxmox_vm_migrate_result.json.data | urlencode }}/status
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    return_content: true
  register: add_proxmox_vm_migrate_status
  changed_when: false
  until: >-
    (
      add_proxmox_vm_migrate_status.content | from_json
    ).data.status == 'stopped'
  retries: 60
  delay: 10
  when: add_proxmox_vm_provision_node != add_proxmox_vm_target_node

- name: Assert Proxmox migration completed successfully
  ansible.builtin.assert:
    that:
      - (add_proxmox_vm_migrate_status.content | from_json).data.exitstatus == 'OK'
    fail_msg: >-
      Proxmox VM migration failed for {{ vm_name }}:
      {{ (add_proxmox_vm_migrate_status.content | from_json).data | to_nice_json }}
  when: add_proxmox_vm_provision_node != add_proxmox_vm_target_node

- name: Switch active Proxmox node to final target
  ansible.builtin.set_fact:
    add_proxmox_vm_active_node: "{{ add_proxmox_vm_target_node }}"
  when: add_proxmox_vm_provision_node != add_proxmox_vm_target_node

- name: Apply final CPU and memory after autoinstall shutdown
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    node: "{{ add_proxmox_vm_active_node }}"
    vmid: "{{ vm.vmid }}"
    cores: "{{ vm.cores }}"
    memory: "{{ vm.memory_mb }}"
    state: present
    update: true
  when: >
    (vm.cores | int) != (autoinstall_provision_cores | int)
    or (vm.memory_mb | int) != (autoinstall_provision_memory_mb | int)

- name: Query VM config after CD-ROM removal
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ add_proxmox_vm_active_node }}/qemu/{{ vm.vmid }}/config"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    return_content: true
  register: add_proxmox_vm_config_after_cdrom_removal
  changed_when: false

- name: Show VM config after CD-ROM removal
  ansible.builtin.debug:
    msg:
      boot: "{{ add_proxmox_vm_config_after_cdrom_removal.json.data.boot | default('missing') }}"
      ide2: "{{ add_proxmox_vm_config_after_cdrom_removal.json.data.ide2 | default('missing') }}"
      scsi0: "{{ add_proxmox_vm_config_after_cdrom_removal.json.data.scsi0 | default('missing') }}"

- name: Show extra disk config payload
  ansible.builtin.debug:
    msg:
      controller: "{{ 'scsi' ~ (loop_index + 1) }}"
      value: "{{ item.pve_storage ~ ':' ~ item.disk_gb ~ ',serial=' ~ item.disk_id }}"
  loop: "{{ vm.extra_disks | default([]) }}"
  loop_control:
    index_var: loop_index
    label: "{{ item.disk_id }}"

- name: Attach extra disks after install
  ansible.builtin.uri:
    url: >-
      https://{{ proxmox_api_host }}:8006/api2/json/nodes/{{ add_proxmox_vm_active_node }}/qemu/{{ vm.vmid }}/config
    method: PUT
    headers:
      Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    body_format: form-urlencoded
    body: >-
      {{
        {}
        | combine({
            ('scsi' ~ (loop_index + 1)): (
              item.pve_storage ~ ':' ~ item.disk_gb ~ ',serial=' ~ item.disk_id
            )
          })
      }}
    status_code: 200
  loop: "{{ vm.extra_disks | default([]) }}"
  loop_control:
    index_var: loop_index
    label: "{{ item.disk_id }}"

- name: Start VM
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_verify_ssl }}"
    node: "{{ add_proxmox_vm_active_node }}"
    vmid: "{{ vm.vmid }}"
    state: started
