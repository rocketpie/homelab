- name: Validate required variables for autoinstall seed export
  ansible.builtin.assert:
    that:
      - vm_name is defined
      - vm.ansible_user is defined
      - shared_admin_users is defined
      - autoinstall_export_directory is defined
      - autoinstall_base_url is defined
      - autoinstall_caddy_executable is defined
    fail_msg: "Missing required variables for export-autoinstall-seed role"

- name: Validate static network variables for VM autoinstall
  ansible.builtin.assert:
    that:
      - vm.ansible_host is defined
      - vm.ansible_host | length > 0
      - autoinstall_vm_ipv4_prefix is defined
      - autoinstall_vm_ipv4_gateway is defined
      - autoinstall_vm_ipv4_nameservers is defined
      - autoinstall_vm_ipv4_nameservers | length > 0
    fail_msg: "Missing required static network variables for VM autoinstall"

- name: Resolve host-specific VM users
  ansible.builtin.set_fact:
    vm_host_users: >-
      {%- set result = [] -%}
      {%- set host_users = vm.host_users | default([]) -%}
      {%- set password_map = vm.host_user_passwords | default({}) -%}
      {%- for user in host_users -%}
      {%- set lock_passwd = user.lock_passwd | default(false) | bool -%}
      {%- set password = password_map.get(user.name) -%}
      {%- set has_password = (password | default('', true) | string | length) > 0 -%}
      {%- set password_hash = (password | ansible.builtin.password_hash('sha512')) if (not lock_passwd and has_password) else omit -%}
      {%- set resolved_user = user | combine({'gecos': user.description | default(user.name)}, recursive=True) -%}
      {%- if password_hash is not sameas omit -%}
      {%- set resolved_user = resolved_user | combine({'password_hash': password_hash}, recursive=True) -%}
      {%- endif -%}
      {%- set _ = result.append(resolved_user) -%}
      {%- endfor -%}
      {{ result }}
  no_log: true

- name: Build VM provisioning user list
  ansible.builtin.set_fact:
    vm_users: "{{ (shared_admin_users | default([])) + (vm_host_users | default([])) }}"

- name: Ensure VM provisioning user list is not empty
  ansible.builtin.assert:
    that:
      - vm_users | length > 0
      - vm.ansible_user in (vm_users | map(attribute='name') | list)
      - (vm_users | map(attribute='name') | list | unique | length) == (vm_users | length)
    fail_msg: "VM users must include the inventory ansible_user and use unique names"

- name: Validate VM user definitions
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.ssh_authorized_keys is defined
      - item.ssh_authorized_keys | length > 0
      - (item.lock_passwd | default(false) | bool)
        or ((item.password_hash | default('', true) | string | length) > 0)
    fail_msg: "Invalid VM user definition for {{ item.name | default('unnamed-user') }}"
  loop: "{{ vm_users }}"
  loop_control:
    label: "{{ item.name | default('unnamed-user') }}"

- name: Ensure autoinstall export directory exists
  ansible.builtin.file:
    path: "{{ autoinstall_export_directory }}"
    state: directory
    mode: "0755"

- name: Export autoinstall user-data
  ansible.builtin.template:
    src: user-data.j2
    dest: "{{ autoinstall_export_directory }}/user-data"
    mode: "0644"

- name: Export autoinstall meta-data
  ansible.builtin.template:
    src: meta-data.j2
    dest: "{{ autoinstall_export_directory }}/meta-data"
    mode: "0644"

- name: Export autoinstall vendor-data
  ansible.builtin.template:
    src: vendor-data.j2
    dest: "{{ autoinstall_export_directory }}/vendor-data"
    mode: "0644"

- name: Check whether autoinstall user-data is being served
  ansible.builtin.uri:
    url: "{{ autoinstall_controller_probe_url }}/user-data"
    method: GET
    return_content: false
    status_code: 200
  register: autoinstall_http_check
  failed_when: false
  changed_when: false

- name: Start Caddy if autoinstall seed is not being served
  ansible.builtin.command:
    argv:
      - "{{ autoinstall_caddy_executable }}"
      - run
    chdir: "{{ autoinstall_caddy_executable | dirname }}"
  async: 3600
  poll: 0
  when: autoinstall_http_check.status | default(0) != 200
  changed_when: true

- name: Wait until autoinstall user-data is reachable
  ansible.builtin.uri:
    url: "{{ autoinstall_controller_probe_url }}/user-data"
    method: GET
    return_content: false
    status_code: 200
  register: autoinstall_http_ready
  retries: 3
  delay: 3
  until: autoinstall_http_ready.status == 200
  changed_when: false
