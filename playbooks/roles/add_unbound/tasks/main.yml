---
- name: Install Unbound packages
  ansible.builtin.apt:
    name: "{{ add_unbound_packages }}"
    state: present
    update_cache: true

- name: Ensure Unbound include directory exists
  ansible.builtin.file:
    path: "{{ add_unbound_include_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Unbound state directory exists
  ansible.builtin.file:
    path: "{{ add_unbound_blocklist_state_dir }}"
    state: directory
    owner: "{{ add_unbound_user }}"
    group: "{{ add_unbound_group }}"
    mode: "0755"

- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: "{{ add_unbound_resolved_dropin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable systemd-resolved DNS stub listener
  ansible.builtin.copy:
    dest: "{{ add_unbound_resolved_dropin_file }}"
    content: |
      [Resolve]
      DNSStubListener=no
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved

- name: Build manual DNS records from IP->aliases structure
  ansible.builtin.set_fact:
    add_unbound_manual_dns_records: "{{ lookup('template', 'dns-records-flatten.j2') }}"
  when: homelab_dns_records is defined and homelab_dns_records is mapping

- name: Initialize to empty list if no global records
  ansible.builtin.set_fact:
    add_unbound_manual_dns_records: []
  when: homelab_dns_records is not defined or homelab_dns_records is not mapping

- name: Validate hosts with inventory-derived .vpn DNS records
  ansible.builtin.assert:
    that:
      - vpn_record_name | length == 0 or vpn_ip | length > 0
    fail_msg: >-
      Host '{{ item }}' defines inventory DNS name '{{ vpn_record_name }}' but
      does not define add_vpn_client_overlay_ipv4 for its WireGuard overlay
      IPv4.
  vars:
    vpn_record_name: >-
      {{
        effective_record_name
        if effective_record_name.endswith('.vpn')
        else ''
      }}
    effective_record_name: "{{ hostvars[item].dns_name | default(item) | string | trim }}"
    vpn_ip: >-
      {{
        hostvars[item].add_vpn_client_overlay_ipv4
        | default('', true)
        | string
        | trim
      }}
  loop: "{{ groups['all'] | default([]) }}"
  when:
    - add_unbound_inventory_dns_enabled | bool
    - hostvars[item].ansible_host is defined
    - hostvars[item].ansible_host | string | length > 0
    - hostvars[item].dns_record_enabled | default(true) | bool
  loop_control:
    label: "{{ item }}"

- name: Validate hosts with .vpn aliases
  ansible.builtin.assert:
    that:
      - vpn_aliases | length == 0 or vpn_ip | length > 0
    fail_msg: >-
      Host '{{ item }}' defines .vpn aliases {{ vpn_aliases }} but does not
      define add_vpn_client_overlay_ipv4 for its WireGuard overlay IPv4.
  vars:
    docker_proxy_hostnames: >-
      {{
        hostvars[item].add_docker_reverse_proxy_bindings
        | default([])
        | selectattr('hostnames', 'defined')
        | map(attribute='hostnames')
        | flatten
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | list
      }}
    effective_host_aliases: >-
      {{
        (
          (hostvars[item].dns_aliases | default([]))
          + docker_proxy_hostnames
        )
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}
    vpn_aliases: "{{ effective_host_aliases | select('match', '.*\\.vpn$') | list }}"
    vpn_ip: >-
      {{
        hostvars[item].add_vpn_client_overlay_ipv4
        | default('', true)
        | string
        | trim
      }}
  loop: "{{ groups['all'] | default([]) }}"
  when: add_unbound_inventory_dns_enabled | bool
  loop_control:
    label: "{{ item }}"

- name: Collect host-level DNS aliases
  ansible.builtin.set_fact:
    add_unbound_host_dns_records: >-
      {%- set records = [] -%}
      {%- for host_name in groups['all'] | default([]) -%}
        {%- set host_aliases = hostvars[host_name].dns_aliases | default([]) -%}
        {%- set docker_proxy_hostnames = (
              hostvars[host_name].add_docker_reverse_proxy_bindings
              | default([])
              | selectattr('hostnames', 'defined')
              | map(attribute='hostnames')
              | flatten
              | map('string')
              | map('trim')
              | reject('equalto', '')
              | list
            ) -%}
        {%- set effective_host_aliases = (
              (host_aliases + docker_proxy_hostnames)
              | map('string')
              | map('trim')
              | reject('equalto', '')
              | unique
              | list
            ) -%}
        {%- set vpn_ip = (
              (
                hostvars[host_name].add_vpn_client_overlay_ipv4
                | default('', true)
              )
              | string
              | trim
            ) -%}
        {%- set host_ip = hostvars[host_name].ansible_host | default('') -%}
        {%- if effective_host_aliases and host_ip -%}
          {%- for alias in effective_host_aliases -%}
            {{- records.append({
                  'name': alias,
                  'value': (
                    vpn_ip
                    if alias.endswith('.vpn')
                    else host_ip
                  )
                }) -}}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{- records -}}
  when: add_unbound_inventory_dns_enabled | bool

- name: Initialize empty host records if not collecting
  ansible.builtin.set_fact:
    add_unbound_host_dns_records: []
  when: not (add_unbound_inventory_dns_enabled | bool)

- name: Merge manual records with host aliases
  ansible.builtin.set_fact:
    add_unbound_manual_dns_records: "{{ (add_unbound_manual_dns_records | default([])) + (add_unbound_host_dns_records | default([])) }}"

- name: Validate local DNS record definitions
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.value is defined
      - item.value | length > 0
    fail_msg: "Invalid homelab DNS record: {{ item | to_nice_yaml }}"
  loop: "{{ add_unbound_manual_dns_records }}"
  loop_control:
    label: "{{ item.name | default('unnamed-record') }}"

- name: Initialize inventory-derived DNS records
  ansible.builtin.set_fact:
    add_unbound_inventory_dns_records: []
    add_unbound_dns_record_map: {}

- name: Collect inventory-derived DNS records
  ansible.builtin.set_fact:
    add_unbound_inventory_dns_records: >-
      {{
        add_unbound_inventory_dns_records + [
          {
            'name': (hostvars[item].dns_name | default(item)),
            'value': (
              (
                hostvars[item].add_vpn_client_overlay_ipv4
                | default('', true)
                | string
                | trim
              )
              if ((hostvars[item].dns_name | default(item) | string).endswith('.vpn'))
              else hostvars[item].ansible_host
            )
          }
        ]
      }}
  loop: "{{ groups['all'] | default([]) }}"
  when:
    - add_unbound_inventory_dns_enabled | bool
    - hostvars[item].ansible_host is defined
    - hostvars[item].ansible_host | string | length > 0
    - hostvars[item].dns_record_enabled | default(true) | bool
  loop_control:
    label: "{{ item }}"

- name: Seed DNS record map from inventory-derived records
  ansible.builtin.set_fact:
    add_unbound_dns_record_map: "{{ add_unbound_dns_record_map | combine({item.name: item}, recursive=True) }}"
  loop: "{{ add_unbound_inventory_dns_records }}"
  loop_control:
    label: "{{ item.name }}"

- name: Overlay manual DNS records onto DNS record map
  ansible.builtin.set_fact:
    add_unbound_dns_record_map: "{{ add_unbound_dns_record_map | combine({item.name: item}, recursive=True) }}"
  loop: "{{ add_unbound_manual_dns_records }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build effective DNS record list
  ansible.builtin.set_fact:
    add_unbound_effective_dns_records: "{{ add_unbound_dns_record_map | dict2items | map(attribute='value') | sort(attribute='name') }}"

- name: Render Unbound server config include
  ansible.builtin.template:
    src: homelab-server.conf.j2
    dest: "{{ add_unbound_server_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Unbound

- name: Render local DNS records include
  ansible.builtin.template:
    src: homelab-records.conf.j2
    dest: "{{ add_unbound_local_records_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Unbound

- name: Render Unbound forwarders include
  ansible.builtin.template:
    src: homelab-forwarders.conf.j2
    dest: "{{ add_unbound_forward_zone_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Unbound

- name: Render blocklist source manifest
  ansible.builtin.template:
    src: homelab-blocklist.sources.j2
    dest: "{{ add_unbound_blocklist_sources_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Install blocklist refresh script
  ansible.builtin.template:
    src: unbound-refresh-blocklist.sh.j2
    dest: "{{ add_unbound_blocklist_refresh_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install blocklist refresh service unit
  ansible.builtin.template:
    src: unbound-refresh-blocklist.service.j2
    dest: "/etc/systemd/system/{{ add_unbound_blocklist_refresh_service_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install blocklist refresh timer unit
  ansible.builtin.template:
    src: unbound-refresh-blocklist.timer.j2
    dest: "/etc/systemd/system/{{ add_unbound_blocklist_refresh_timer_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Refresh blocklist configuration
  ansible.builtin.command:
    cmd: "{{ add_unbound_blocklist_refresh_script_path }}"
  register: add_unbound_blocklist_refresh_result
  changed_when: "'updated' in (add_unbound_blocklist_refresh_result.stdout | default(''))"
  when: add_unbound_blocklist_sources | length > 0
  notify: Restart Unbound

- name: Ensure empty blocklist include exists when no sources are configured
  ansible.builtin.copy:
    content: "# No blocklist sources configured\n"
    dest: "{{ add_unbound_blocklist_output_file }}"
    owner: root
    group: root
    mode: "0644"
  when: add_unbound_blocklist_sources | length == 0
  notify: Restart Unbound

- name: Validate Unbound configuration
  ansible.builtin.command:
    cmd: unbound-checkconf
  changed_when: false

- name: Ensure Unbound is running with the rendered configuration
  block:
    - name: Flush handlers before ensuring Unbound is active
      ansible.builtin.meta: flush_handlers

    - name: Enable and start Unbound
      ansible.builtin.service:
        name: "{{ add_unbound_service_name }}"
        enabled: true
        state: started
  rescue:
    - name: Capture current port 53 listeners
      ansible.builtin.shell: |
        ss -H -ltnup '( sport = :53 )' || true
        ss -H -lunp '( sport = :53 )' || true
      args:
        executable: /bin/bash
      register: add_unbound_port_53_inspection
      changed_when: false
      failed_when: false

    - name: Capture Unbound service status
      ansible.builtin.command:
        cmd: "systemctl status {{ add_unbound_service_name }} --no-pager --full"
      register: add_unbound_status_result
      changed_when: false
      failed_when: false

    - name: Capture recent Unbound journal entries
      ansible.builtin.command:
        cmd: "journalctl -xeu {{ add_unbound_service_name }} --no-pager -n 50"
      register: add_unbound_journal_result
      changed_when: false
      failed_when: false

    - name: Fail with Unbound startup diagnostics
      ansible.builtin.fail:
        msg: |
          Failed to start or reload {{ add_unbound_service_name }}.
          port 53 listeners:
          {{ add_unbound_port_53_inspection.stdout | default('(no output)') }}

          systemctl status:
          {{ add_unbound_status_result.stdout | default('(no output)') }}

          journalctl:
          {{ add_unbound_journal_result.stdout | default('(no output)') }}

- name: Enable and start blocklist refresh timer
  ansible.builtin.service:
    name: "{{ add_unbound_blocklist_refresh_timer_name }}"
    enabled: true
    state: started
