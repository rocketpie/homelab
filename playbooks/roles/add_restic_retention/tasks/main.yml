---
- name: Validate restic retention inputs
  ansible.builtin.assert:
    that:
      - ansible_facts['system'] == 'Linux'
      - add_restic_retention_service_user | string | trim | length > 0
      - add_restic_retention_root_dir | string | trim | length > 0
      - add_restic_retention_repositories | length > 0
    fail_msg: >-
      add_restic_retention requires a Linux host, a service user, a repository
      root dir, and at least one configured repository.

- name: Validate restic retention repository items
  ansible.builtin.assert:
    that:
      - item.user is defined
      - item.user | string | trim | length > 0
      - item.repository is defined
      - item.repository | string | trim | length > 0
      - item.enabled is defined
      - item.forget_args is defined
      - item.forget_args | length > 0
    fail_msg: "Invalid add_restic_retention_repositories item: {{ item | to_nice_yaml }}"
  loop: "{{ add_restic_retention_repositories }}"
  loop_control:
    label: "{{ (item.user | default('')) ~ '/' ~ (item.repository | default('')) }}"

- name: Materialize enabled restic retention repositories
  ansible.builtin.set_fact:
    add_restic_retention_enabled_repositories: >-
      {{
        add_restic_retention_repositories
        | selectattr('enabled', 'equalto', true)
        | list
      }}

- name: Assert enabled restic retention repositories exist
  ansible.builtin.assert:
    that:
      - add_restic_retention_enabled_repositories | length > 0
    fail_msg: "add_restic_retention requires at least one enabled repository."

- name: Build materialized restic retention repository metadata
  ansible.builtin.set_fact:
    add_restic_retention_materialized_repositories: >-
      {{
        (add_restic_retention_materialized_repositories | default([]))
        + [
            item
            | combine(
                {
                  'key': (item.user | trim) ~ '/' ~ (item.repository | trim),
                  'local_path': (
                    add_restic_retention_root_dir
                    ~ '/' ~ (item.user | trim)
                    ~ '/' ~ (item.repository | trim)
                  ),
                  'env_file': (
                    add_restic_retention_env_dir
                    ~ '/'
                    ~ (
                      ((item.user | trim) ~ '__' ~ (item.repository | trim))
                      | regex_replace('[^A-Za-z0-9._-]', '_')
                    )
                    ~ '.env'
                  )
                }
              )
          ]
      }}
  loop: "{{ add_restic_retention_enabled_repositories }}"
  loop_control:
    label: "{{ item.user }}/{{ item.repository }}"

- name: Initialize restic retention runnable and skipped repository lists
  ansible.builtin.set_fact:
    add_restic_retention_password_ready_repositories: []
    add_restic_retention_missing_password_repositories: []

- name: Split enabled restic retention repositories by password availability
  ansible.builtin.set_fact:
    add_restic_retention_password_ready_repositories: >-
      {{
        (add_restic_retention_password_ready_repositories | default([]))
        + (
            [item]
            if (
              item.key in add_restic_retention_repository_passwords
              and
              add_restic_retention_repository_passwords[item.key] | string | trim | length > 0
            )
            else []
          )
      }}
    add_restic_retention_missing_password_repositories: >-
      {{
        (add_restic_retention_missing_password_repositories | default([]))
        + (
            [item]
            if not (
              item.key in add_restic_retention_repository_passwords
              and
              add_restic_retention_repository_passwords[item.key] | string | trim | length > 0
            )
            else []
          )
      }}
  loop: "{{ add_restic_retention_materialized_repositories }}"
  loop_control:
    label: "{{ item.key }}"

- name: Warn about enabled restic retention repositories without repository passwords
  ansible.builtin.debug:
    msg: >-
      WARNING: enabled retention repository {{ item.key }} has no
      add_restic_retention_repository_passwords entry and will be skipped.
  loop: "{{ add_restic_retention_missing_password_repositories }}"
  loop_control:
    label: "{{ item.key }}"
  changed_when: false

- name: Warn when no enabled restic retention repositories are runnable yet
  ansible.builtin.debug:
    msg: >-
      WARNING: no enabled retention repositories currently have repository
      passwords configured, so the timer will run but skip all repositories.
  when: add_restic_retention_password_ready_repositories | length == 0
  changed_when: false

- name: Install restic retention package
  ansible.builtin.apt:
    name: "{{ add_restic_retention_packages }}"
    state: present
    update_cache: true

- name: Check whether restic retention service user exists
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ add_restic_retention_service_user }}"
  register: add_restic_retention_service_user_getent_result
  changed_when: false

- name: Assert restic retention service user exists
  ansible.builtin.assert:
    that:
      - add_restic_retention_service_user_getent_result.rc == 0
    fail_msg: >-
      add_restic_retention_service_user {{ add_restic_retention_service_user }}
      does not exist on the target host.

- name: Ensure restic retention directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ add_restic_retention_config_dir }}"
      owner: root
      group: "{{ add_restic_retention_service_group }}"
      mode: "0750"
    - path: "{{ add_restic_retention_env_dir }}"
      owner: root
      group: "{{ add_restic_retention_service_group }}"
      mode: "0750"
  loop_control:
    label: "{{ item.path }}"

- name: Install restic retention repository password env files
  ansible.builtin.copy:
    content: |
      RESTIC_PASSWORD={{ add_restic_retention_repository_passwords[item.key] }}
    dest: "{{ item.env_file }}"
    owner: root
    group: "{{ add_restic_retention_service_group }}"
    mode: "0640"
  loop: "{{ add_restic_retention_password_ready_repositories }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Remove stale restic retention env files for repositories without passwords
  ansible.builtin.file:
    path: "{{ item.env_file }}"
    state: absent
  loop: "{{ add_restic_retention_missing_password_repositories }}"
  loop_control:
    label: "{{ item.key }}"

- name: Check whether restic retention root dir exists
  ansible.builtin.stat:
    path: "{{ add_restic_retention_root_dir }}"
  register: add_restic_retention_root_stat

- name: Discover on-disk restic repositories
  ansible.builtin.find:
    paths: "{{ add_restic_retention_root_dir }}"
    patterns: config
    recurse: true
    file_type: file
  register: add_restic_retention_discovered_configs
  when: add_restic_retention_root_stat.stat.exists

- name: Materialize discovered restic repository keys
  ansible.builtin.set_fact:
    add_restic_retention_discovered_repository_keys: >-
      {{
        add_restic_retention_discovered_configs.files
        | map(attribute='path')
        | map('regex_replace', '^.*/([^/]+)/([^/]+)/config$', '\\1/\\2')
        | list
      }}
  when: add_restic_retention_root_stat.stat.exists

- name: Initialize empty discovered restic repository keys when root dir is absent
  ansible.builtin.set_fact:
    add_restic_retention_discovered_repository_keys: []
  when: not add_restic_retention_root_stat.stat.exists

- name: Materialize configured restic repository keys
  ansible.builtin.set_fact:
    add_restic_retention_configured_repository_keys: >-
      {{
        add_restic_retention_repositories
        | map(attribute='user')
        | zip(add_restic_retention_repositories | map(attribute='repository'))
        | map('join', '/')
        | list
      }}

- name: Warn about configured restic repositories that do not exist yet
  ansible.builtin.debug:
    msg: >-
      WARNING: configured retention repository {{ item }} does not exist yet
      under {{ add_restic_retention_root_dir }} and will be skipped at runtime.
  loop: >-
    {{
      add_restic_retention_configured_repository_keys
      | difference(add_restic_retention_discovered_repository_keys | default([]))
    }}
  loop_control:
    label: "{{ item }}"
  changed_when: false

- name: Warn about on-disk restic repositories without retention configuration
  ansible.builtin.debug:
    msg: >-
      WARNING: discovered repository {{ item }} under
      {{ add_restic_retention_root_dir }} has no retention configuration.
  loop: >-
    {{
      (add_restic_retention_discovered_repository_keys | default([]))
      | difference(add_restic_retention_configured_repository_keys)
    }}
  loop_control:
    label: "{{ item }}"
  changed_when: false

- name: Install restic retention script
  ansible.builtin.template:
    src: restic-retention.sh.j2
    dest: "{{ add_restic_retention_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install restic retention service unit
  ansible.builtin.template:
    src: restic-retention.service.j2
    dest: "{{ add_restic_retention_service_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart restic retention timer

- name: Install restic retention timer unit
  ansible.builtin.template:
    src: restic-retention.timer.j2
    dest: "{{ add_restic_retention_timer_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart restic retention timer

- name: Flush handlers before enabling restic retention timer
  ansible.builtin.meta: flush_handlers

- name: Enable and start restic retention timer
  ansible.builtin.service:
    name: "{{ add_restic_retention_timer_name }}"
    enabled: true
    state: started
