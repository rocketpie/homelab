---
- name: Validate admin script inputs
  ansible.builtin.assert:
    that:
      - ansible_system == 'Linux'
      - add_admin_scripts_user | string | trim | length > 0
      - >-
        (
          (add_admin_scripts_service_groups | default([]) | length) > 0
          or
          (add_admin_scripts_extra_scripts | default([]) | length) > 0
        )
    fail_msg: >-
      add_admin_scripts requires a Linux host, a target user, and at least one
      service group or extra script.

- name: Validate configured admin script service groups
  ansible.builtin.assert:
    that:
      - item.key is defined
      - item.key | string | trim | length > 0
      - item.label is defined
      - item.label | string | trim | length > 0
      - item.status_units is defined
      - item.status_units | length > 0
      - item.start_enable_units is defined
      - item.start_start_units is defined
      - item.stop_disable_units is defined
      - item.stop_stop_units is defined
    fail_msg: "Invalid add_admin_scripts_service_groups item: {{ item | to_nice_yaml }}"
  loop: "{{ add_admin_scripts_service_groups }}"
  loop_control:
    label: "{{ item.key | default('unnamed-group') }}"

- name: Validate configured admin extra scripts
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | string | trim | length > 0
      - >-
        (
          (
            item.content is defined
            and
            item.content | string | trim | length > 0
          )
          or
          (
            item.link_target is defined
            and
            item.link_target | string | trim | length > 0
            and
            item.link_target.startswith('/')
          )
        )
    fail_msg: "Invalid add_admin_scripts_extra_scripts item: {{ item | to_nice_yaml }}"
  loop: "{{ add_admin_scripts_extra_scripts }}"
  loop_control:
    label: "{{ item.name | default('unnamed-script') }}"

- name: Check whether admin script user exists
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ add_admin_scripts_user }}"
  register: add_admin_scripts_user_getent_result
  changed_when: false

- name: Assert admin script user exists
  ansible.builtin.assert:
    that:
      - add_admin_scripts_user_getent_result.rc == 0
      - add_admin_scripts_user_getent_result.stdout | string | trim | length > 0
    fail_msg: >-
      Could not resolve add_admin_scripts_user {{ add_admin_scripts_user }}
      on the target host.

- name: Materialize admin script user home
  ansible.builtin.set_fact:
    add_admin_scripts_user_passwd_fields: "{{ add_admin_scripts_user_getent_result.stdout.split(':') }}"
    add_admin_scripts_user_home: "{{ add_admin_scripts_user_getent_result.stdout.split(':')[5] | trim }}"
    add_admin_scripts_dir: "{{ add_admin_scripts_user_getent_result.stdout.split(':')[5] | trim }}"

- name: Assert admin script user home was resolved
  ansible.builtin.assert:
    that:
      - add_admin_scripts_user_passwd_fields | length >= 7
      - add_admin_scripts_user_home | string | trim | length > 0
      - add_admin_scripts_user_home.startswith('/')
      - add_admin_scripts_dir | string | trim | length > 0
      - add_admin_scripts_dir.startswith('/')
    fail_msg: >-
      Could not determine a home directory for add_admin_scripts_user
      {{ add_admin_scripts_user }}.

- name: Check whether connection user exists for admin script cleanup
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ ansible_user }}"
  register: add_admin_scripts_connection_user_getent_result
  changed_when: false
  when:
    - ansible_user is defined
    - ansible_user | string | trim | length > 0
    - ansible_user != add_admin_scripts_user

- name: Materialize legacy broken admin script path
  ansible.builtin.set_fact:
    add_admin_scripts_legacy_broken_dir: >-
      {{
        (add_admin_scripts_connection_user_getent_result.stdout.split(':')[5] | trim)
        ~ '/\\1'
      }}
  when:
    - add_admin_scripts_connection_user_getent_result is defined
    - add_admin_scripts_connection_user_getent_result.rc == 0
    - add_admin_scripts_connection_user_getent_result.stdout | string | trim | length > 0

- name: Check whether legacy broken admin script path exists
  ansible.builtin.stat:
    path: "{{ add_admin_scripts_legacy_broken_dir }}"
  register: add_admin_scripts_legacy_broken_dir_stat
  when: add_admin_scripts_legacy_broken_dir is defined

- name: Remove legacy broken admin script path
  ansible.builtin.file:
    path: "{{ add_admin_scripts_legacy_broken_dir }}"
    state: absent
  when:
    - add_admin_scripts_legacy_broken_dir_stat is defined
    - add_admin_scripts_legacy_broken_dir_stat.stat.exists

- name: Ensure admin script directory exists
  ansible.builtin.file:
    path: "{{ add_admin_scripts_dir }}"
    state: directory
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"

- name: Install shared homelab admin helper
  ansible.builtin.template:
    src: homelab-admin-lib.sh.j2
    dest: "{{ add_admin_scripts_dir }}/homelab-admin-lib.sh"
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"

- name: Install host status script
  ansible.builtin.template:
    src: host-status.sh.j2
    dest: "{{ add_admin_scripts_dir }}/host-status"
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"

- name: Install start scripts for configured service groups
  ansible.builtin.template:
    src: service-start.sh.j2
    dest: "{{ add_admin_scripts_dir }}/start-{{ item.key }}"
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"
  loop: "{{ add_admin_scripts_service_groups }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install stop scripts for configured service groups
  ansible.builtin.template:
    src: service-stop.sh.j2
    dest: "{{ add_admin_scripts_dir }}/stop-{{ item.key }}"
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"
  loop: "{{ add_admin_scripts_service_groups }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install extra admin scripts
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ add_admin_scripts_dir }}/{{ item.name }}"
    owner: "{{ add_admin_scripts_user }}"
    group: "{{ add_admin_scripts_group }}"
    mode: "0750"
  loop: "{{ add_admin_scripts_extra_scripts }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.content is defined
    - item.content | string | trim | length > 0

- name: Install extra admin script links
  ansible.builtin.file:
    src: "{{ item.link_target }}"
    dest: "{{ add_admin_scripts_dir }}/{{ item.name }}"
    state: link
    force: true
  loop: "{{ add_admin_scripts_extra_scripts }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.link_target is defined
    - item.link_target | string | trim | length > 0
