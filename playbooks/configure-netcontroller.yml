---
- name: Build netcontroller rollout groups
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    unbound_rollout_hosts: "{{ groups['unbound'] | default([]) }}"
    unbound_rollout_active_host: >-
      {{
        unbound_active_resolver_host
        | default(unbound_rollout_hosts | last, true)
      }}
    unbound_rollout_passive_hosts: >-
      {{
        unbound_rollout_hosts
        | reject('equalto', unbound_rollout_active_host)
        | list
      }}

  tasks:
    - name: Ensure dig is available on the controller
      ansible.builtin.command:
        cmd: which dig
      changed_when: false

    - name: Ensure at least one unbound host is defined
      ansible.builtin.assert:
        that:
          - unbound_rollout_hosts | length > 0
        fail_msg: "The 'unbound' inventory group is empty."

    - name: Ensure active resolver host is part of the unbound group
      ansible.builtin.assert:
        that:
          - unbound_rollout_active_host in unbound_rollout_hosts
        fail_msg: >-
          Active resolver '{{ unbound_rollout_active_host }}' is not part of the
          'unbound' inventory group.

    - name: Show DNS rollout order
      ansible.builtin.debug:
        msg:
          - "passive resolvers first: {{ unbound_rollout_passive_hosts }}"
          - "active resolver last: {{ unbound_rollout_active_host }}"
        verbosity: 1

    - name: Build passive resolver rollout group
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: unbound_rollout_passive
      loop: "{{ unbound_rollout_passive_hosts }}"
      loop_control:
        label: "{{ item }}"

    - name: Build active resolver rollout group
      ansible.builtin.add_host:
        name: "{{ unbound_rollout_active_host }}"
        groups: unbound_rollout_active

- name: Install DHCP service components
  hosts: kea
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for DHCP configuration
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_kea
        record_deployment_metadata:
          service: kea

  roles:
    - role: add_kea

  post_tasks:
    - name: Record successful deployment history for DHCP configuration
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: finish
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_kea
        record_deployment_metadata:
          service: kea

- name: Install and verify DNS service components on passive resolvers
  hosts: unbound_rollout_passive
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for passive DNS rollout
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_unbound
        record_deployment_metadata:
          service: unbound
          rollout_phase: passive

  roles:
    - role: add_unbound

  post_tasks:
    - name: Verify DNS from controller via passive resolver
      ansible.builtin.include_tasks: tasks/test-unbound-from-controller.yml

    - name: Record successful deployment history for passive DNS rollout
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: finish
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_unbound
        record_deployment_metadata:
          service: unbound
          rollout_phase: passive

- name: Install and verify DNS service components on active resolver
  hosts: unbound_rollout_active
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: true

  pre_tasks:
    - name: Record incomplete deployment history for active DNS rollout
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: start
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_unbound
        record_deployment_metadata:
          service: unbound
          rollout_phase: active

  roles:
    - role: add_unbound

  post_tasks:
    - name: Verify DNS from controller via active resolver
      ansible.builtin.include_tasks: tasks/test-unbound-from-controller.yml

    - name: Record successful deployment history for active DNS rollout
      ansible.builtin.include_role:
        name: record_deployment
      vars:
        record_deployment_phase: finish
        record_deployment_playbook: configure-netcontroller.yml
        record_deployment_roles:
          - add_unbound
        record_deployment_metadata:
          service: unbound
          rollout_phase: active
