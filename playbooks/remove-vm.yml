---
- name: Destroy VM on Proxmox
  hosts: localhost
  gather_facts: false
  vars:
    remove_vm_task_retries: 10
    remove_vm_task_delay: 5

  tasks:
    - name: Prompt for VM to destroy when not provided
      ansible.builtin.pause:
        prompt: "VM to destroy? must match inventory hostname [{{ autoinstall_default_vm_name }}]"
      register: destroy_vm_name_prompt

    - name: Resolve VM name for destroy
      ansible.builtin.set_fact:
        vm_name: "{{ (destroy_vm_name_prompt.user_input | default('', true) | trim) or autoinstall_default_vm_name }}"
      when: vm_name is not defined

    - name: Ensure target VM exists in inventory
      ansible.builtin.assert:
        that:
          - vm_name in hostvars
        fail_msg: "Host '{{ vm_name }}' is not defined in inventory"

    - name: Materialize selected VM vars
      ansible.builtin.set_fact:
        vm: "{{ hostvars[vm_name] }}"

    - name: Query existing Proxmox VMs
      community.proxmox.proxmox_vm_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
      register: proxmox_existing_vms

    - name: Materialize matches by vmid
      ansible.builtin.set_fact:
        proxmox_existing_vms_by_vmid: >-
          {{
            proxmox_existing_vms.proxmox_vms
            | selectattr('vmid', 'equalto', (vm.vmid | int))
            | list
          }}

    - name: Materialize matches by name
      ansible.builtin.set_fact:
        proxmox_existing_vms_by_name: >-
          {{
            proxmox_existing_vms.proxmox_vms
            | selectattr('name', 'defined')
            | selectattr('name', 'equalto', vm_name)
            | list
          }}

    - name: Assert exactly one VM matches requested vmid and name
      ansible.builtin.assert:
        that:
          - proxmox_existing_vms_by_vmid | length == 1
          - proxmox_existing_vms_by_name | length == 1
          - (proxmox_existing_vms_by_vmid | first).vmid == (proxmox_existing_vms_by_name | first).vmid
        fail_msg: >-
          Expected exactly one VM by vmid {{ vm.vmid }} and exactly one by name {{ vm_name }},
          referring to the same VM.
          by_vmid={{ proxmox_existing_vms_by_vmid }}
          by_name={{ proxmox_existing_vms_by_name }}


    - name: Materialize matched VM from Proxmox
      ansible.builtin.set_fact:
        proxmox_vm_match: "{{ proxmox_existing_vms_by_vmid | first }}"

    - name: Show VM details from Proxmox before destroy
      ansible.builtin.debug:
        msg:
          vmid: "{{ proxmox_vm_match.vmid | default('n/a') }}"
          name: "{{ proxmox_vm_match.name | default('n/a') }}"
          node: "{{ proxmox_vm_match.node | default('n/a') }}"
          status: "{{ proxmox_vm_match.status | default('n/a') }}"
          cpus: "{{ proxmox_vm_match.cpus | default('n/a') }}"
          maxmem: "{{ proxmox_vm_match.maxmem | default('n/a') }}"
          maxdisk: "{{ proxmox_vm_match.maxdisk | default('n/a') }}"

    - name: Query existing Proxmox replication jobs
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/cluster/replication"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: remove_vm_replication_jobs_response

    - name: Materialize replication jobs for target VM
      ansible.builtin.set_fact:
        remove_vm_replication_jobs: >-
          {{
            remove_vm_replication_jobs_response.json.data
            | default([])
            | selectattr('guest', 'defined')
            | selectattr('guest', 'equalto', (vm.vmid | int))
            | list
          }}

    - name: Show replication jobs to remove before destroy
      ansible.builtin.debug:
        msg:
          replication_jobs: "{{ remove_vm_replication_jobs }}"
        verbosity: 0

    - name: Pause for destroy confirmation
      ansible.builtin.pause:
        prompt: >-
          About to destroy VM {{ vm_name }} (vmid {{ vm.vmid }}).
          Press Enter to continue, or Ctrl+C then a to abort.

    - name: Stop VM before destroy
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ proxmox_vm_match.node }}"
        vmid: "{{ vm.vmid }}"
        state: stopped
        force: true
      when: (proxmox_vm_match.status | default('')) != 'stopped'

    - name: Remove VM replication jobs while keeping replicated volumes
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:8006/api2/json/cluster/replication/{{ item.id | urlencode }}?keep=1"
        method: DELETE
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: remove_vm_replication_delete_result
      loop: "{{ remove_vm_replication_jobs }}"
      loop_control:
        label: "{{ item.id }}"

    - name: Wait for Proxmox replication deletion tasks to finish
      ansible.builtin.uri:
        url: >-
          {{
            'https://' ~ proxmox_api_host ~ ':8006/api2/json/nodes/' ~
            ((item.json.data | string | trim) | regex_replace('^UPID:([^:]+):.*$', '\1')) ~
            '/tasks/' ~
            ((item.json.data | string | trim) | urlencode) ~ '/status'
          }}
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        return_content: true
      register: remove_vm_replication_delete_status
      changed_when: false
      until: >-
        remove_vm_replication_delete_status.content | default('') | regex_search(
          '"status"\\s*:\\s*"stopped"'
        )
      retries: "{{ remove_vm_task_retries }}"
      delay: "{{ remove_vm_task_delay }}"
      loop: "{{ remove_vm_replication_delete_result.results | default([]) }}"
      loop_control:
        label: "{{ item.item.id | default(item.item | string) }}"
      when:
        - item.json is defined
        - item.json.data is defined
        - item.json.data | string | trim | length > 0
        - item.json.data | string is match('^UPID:')

    - name: Destroy VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_verify_ssl }}"
        node: "{{ proxmox_vm_match.node }}"
        vmid: "{{ vm.vmid }}"
        state: absent
